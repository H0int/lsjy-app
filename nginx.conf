# Nginx配置 - 罗圣纪元 SaaS 平台
# 部署到: /etc/nginx/conf.d/lsjyapp.conf

# CORS源匹配 - 动态回显Origin，避免*与credentials冲突
map $http_origin $cors_origin {
    default "";
    "~*^https://lsjyapp\.cn$" $http_origin;
    "~*^https://www\.lsjyapp\.cn$" $http_origin;
    "~*^https://h0int\.github\.io$" $http_origin;
    "~*^http://localhost" $http_origin;
}

# 前台 - lsjyapp.cn
server {
    listen 80;
    server_name lsjyapp.cn www.lsjyapp.cn;

    # HTTPS重定向
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name lsjyapp.cn www.lsjyapp.cn;

    # SSL证书
    ssl_certificate /etc/letsencrypt/live/lsjyapp.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lsjyapp.cn/privkey.pem;

    # 前端静态文件
    root /usr/share/nginx/html/frontend;
    index index.html;

    # Vue Router History模式
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API代理到后端
    location /api/ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# 后台管理 - admin.lsjyapp.cn
server {
    listen 80;
    server_name admin.lsjyapp.cn;

    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name admin.lsjyapp.cn;

    # SSL证书
    ssl_certificate /etc/letsencrypt/live/admin.lsjyapp.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.lsjyapp.cn/privkey.pem;

    # Admin前端静态文件
    root /usr/share/nginx/html/admin;
    index index.html;

    # Vue Router History模式
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API代理到后端
    location /api/ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# API接口 - api.lsjyapp.cn
server {
    listen 80;
    server_name api.lsjyapp.cn;

    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.lsjyapp.cn;

    # SSL证书
    ssl_certificate /etc/letsencrypt/live/api.lsjyapp.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.lsjyapp.cn/privkey.pem;

    # 直接代理到后端API
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # CORS headers - 动态回显Origin，支持credentials
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
        add_header Access-Control-Allow-Headers 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
        add_header Access-Control-Allow-Credentials 'true' always;
        add_header Access-Control-Expose-Headers 'Content-Length,Content-Range' always;
        add_header Access-Control-Max-Age 1728000 always;

        # OPTIONS预检请求直接返回204
        if ($request_method = 'OPTIONS') {
            return 204;
        }

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
