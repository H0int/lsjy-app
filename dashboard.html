<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>罗圣AI · 管理后台 v2.0</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root{
  --bg:#0c1222;--card:#131b2e;--card-hover:#1a2540;
  --border:#1e2d45;--muted:#64748b;--fg:#e2e8f0;
  --primary:#3b82f6;--primary-glow:rgba(59,130,246,0.3);
  --success:#10b981;--warning:#f59e0b;--danger:#ef4444;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--fg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#2a3a52}

@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes barGrow{from{height:0}to{height:var(--h)}}
@keyframes glow{0%,100%{box-shadow:0 0 20px var(--primary-glow)}50%{box-shadow:0 0 40px var(--primary-glow)}}
@keyframes logScroll{0%{transform:translateY(0)}100%{transform:translateY(-50%)}}
@keyframes progressFill{from{stroke-dashoffset:251.2}to:var(--offset)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}

.fade-in{animation:fadeIn .4s ease-out forwards}
.slide-in{animation:slideIn .3s ease-out forwards}
.pulse{animation:pulse 2s ease-in-out infinite}
.spin{animation:spin 1s linear infinite}
.shimmer{background:linear-gradient(90deg,var(--card) 25%,var(--card-hover) 50%,var(--card) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite}

.card{background:var(--card);border:1px solid var(--border);border-radius:12px;transition:all .2s}
.card:hover{border-color:rgba(59,130,246,.3);transform:translateY(-1px)}

.btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--primary);color:white}
.btn-primary:hover{background:#2563eb}
.btn-ghost{color:var(--muted);background:transparent}
.btn-ghost:hover{background:var(--border);color:var(--fg)}

input,select{background:var(--bg);border:1px solid var(--border);color:var(--fg);padding:8px 12px;border-radius:8px;font-size:13px;transition:border-color .2s}
input:focus,select:focus{outline:none;border-color:var(--primary)}
input::placeholder{color:var(--muted)}

.badge{padding:4px 10px;border-radius:9999px;font-size:11px;font-weight:600}
.badge-success{background:rgba(16,185,129,.1);color:var(--success);border:1px solid rgba(16,185,129,.2)}
.badge-warning{background:rgba(245,158,11,.1);color:var(--warning);border:1px solid rgba(245,158,11,.2)}
.badge-danger{background:rgba(239,68,68,.1);color:var(--danger);border:1px solid rgba(239,68,68,.2)}
.badge-info{background:rgba(59,130,246,.1);color:var(--primary);border:1px solid rgba(59,130,246,.2)}

.log-info{color:#60a5fa}
.log-warn{color:#fbbf24}
.log-error{color:#f87171}
.log-debug{color:#a78bfa}

table{width:100%;border-collapse:collapse}
th{text-align:left;padding:12px 16px;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
td{padding:14px 16px;font-size:13px;border-bottom:1px solid rgba(30,45,69,.5)}
tr:hover td{background:rgba(30,45,69,.3)}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:1000;animation:fadeIn .2s ease-out}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;max-width:600px;width:90%;max-height:85vh;overflow-y:auto;animation:fadeIn .3s ease-out}
</style>
<script>
tailwind.config={
  theme:{
    extend:{
      colors:{
        bg:'#0c1222',card:'#131b2e','card-hover':'#1a2540',
        border:'#1e2d45',muted:'#64748b',fg:'#e2e8f0',
        primary:'#3b82f6','primary-dark':'#2563eb',
        success:'#10b981',warning:'#f59e0b',danger:'#ef4444'
      }
    }
  }
}
</script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useMemo,useRef,useCallback}=React;
