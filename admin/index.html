<!DOCTYPE html>
<html lang="zh-CN" class="notranslate">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="google" content="notranslate">
<meta name="robots" content="notranslate">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,minimum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="format-detection" content="telephone=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="logo.png" type="image/png">
<title>罗圣纪元 - 后台管理系统</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --p:#00f5ff;--ph:#0ea5e9;--pl:#67e8f9;--ps:rgba(0,245,255,.08);
  --p2:#8b5cf6;--p2h:#7c3aed;--p2l:#c4b5fd;--p2s:rgba(139,92,246,.1);
  --n:#e2e8f0;--nd:#94a3b8;--b:#64748b;--l:#475569;--bd:rgba(255,255,255,.08);
  --bg:#0a0e17;--bg2:#0f1623;--bg3:#141c2e;
  --w:#e2e8f0;--w2:rgba(255,255,255,.05);
  --card:rgba(255,255,255,.04);--card-hover:rgba(255,255,255,.08);
  --glass:rgba(255,255,255,.06);--glass-b:rgba(0,245,255,.1);
  --err:#f43f5e;--ok:#10b981;--warn:#f59e0b;
  --shadow:0 4px 12px rgba(0,0,0,.3);
  --sidebar-bg:#060a12;--sidebar-active:rgba(0,245,255,.12);
  --sidebar:220px;--topbar:56px;
}
body.theme-light{
  --p:#0088cc;--ph:#0077b5;--pl:#48cae4;--ps:rgba(0,136,204,.08);
  --p2:#7c3aed;--p2h:#6d28d9;--p2l:#a78bfa;--p2s:rgba(124,58,237,.08);
  --n:#1e293b;--nd:#64748b;--b:#94a3b8;--l:#cbd5e1;--bd:rgba(0,0,0,.08);
  --bg:#f8fafc;--bg2:#ffffff;--bg3:#f1f5f9;
  --w:#1e293b;--w2:rgba(0,0,0,.05);
  --card:rgba(255,255,255,.9);--card-hover:rgba(255,255,255,1);
  --glass:rgba(255,255,255,.8);--glass-b:rgba(0,136,204,.15);
  --shadow:0 4px 12px rgba(0,0,0,.08);
  --sidebar-bg:#fff;--sidebar-active:rgba(0,136,204,.12);
  color:#1e293b;
}
body.theme-enterprise{
  --p:#f59e0b;--ph:#d97706;--pl:#fbbf24;--ps:rgba(245,158,11,.08);
  --p2:#ef4444;--p2h:#dc2626;--p2l:#f87171;--p2s:rgba(239,68,68,.1);
  --n:#e8e8f0;--nd:#a0a0b8;--b:#888;--l:#666;--bd:rgba(245,158,11,.15);
  --bg:#0d0d1a;--bg2:#12122a;--bg3:#1a1a35;
  --w:#e8e8f0;--w2:rgba(255,255,255,.04);
  --card:rgba(245,158,11,.04);--card-hover:rgba(245,158,11,.08);
  --glass:rgba(255,255,255,.06);--glass-b:rgba(245,158,11,.15);
  --shadow:0 4px 16px rgba(0,0,0,.4);
  --sidebar-bg:#08081a;--sidebar-active:rgba(245,158,11,.15);
}

/* 表格斑马纹 */
table tbody tr:nth-child(even){background:var(--card)}
table tbody tr:hover{background:var(--card-hover)}
table{width:100%;border-collapse:collapse}
table th,table td{padding:12px 16px;border-bottom:1px solid var(--bd);font-size:14px;color:var(--n)}
/* 登录居中 */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-box{width:100%;max-width:380px;text-align:center;padding:32px}
.login-box h2{font-size:22px;font-weight:700;margin-bottom:6px}
.login-box .sub{font-size:13px;color:var(--nd);margin-bottom:24px}
.login-box label{display:block;text-align:left;font-size:13px;color:var(--nd);margin-bottom:6px}
.login-box input{width:100%;height:44px;border-radius:10px;border:1px solid var(--bd);background:var(--card);color:var(--n);padding:0 14px;font-size:14px;box-sizing:border-box;margin-bottom:14px;transition:border .2s}
.login-box input:focus{outline:none;border-color:var(--p);box-shadow:0 0 0 3px var(--ps)}
.login-box .btn-login{width:100%;height:46px;border:none;border-radius:10px;background:var(--p);color:var(--bg);font-size:15px;font-weight:600;cursor:pointer;margin-top:4px}
.login-box .btn-login:hover{opacity:.9}
/* 数据看板对称 */
.dash-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:20px}
.dash-card{background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:20px;text-align:center;display:flex;flex-direction:column;align-items:center}
.dash-card:hover{border-color:var(--glass-b);transform:translateY(-2px);transition:all .2s}
.dash-card .num{font-size:28px;font-weight:800;color:var(--p)}
.dash-card .lbl{font-size:12px;color:var(--nd);margin-top:4px}
/* 手机端后端 */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%);position:fixed;z-index:999}
  .sidebar.open{transform:translateX(0)}
  .main-area{margin-left:0!important}
  .dash-grid{grid-template-columns:repeat(2,1fr)!important}
  table{font-size:12px;min-width:600px}
  .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .login-box{padding:24px 20px}
  .login-box input{height:56px;font-size:16px}
  .login-box .btn-login{height:50px;font-size:16px}
  body{padding-bottom:env(safe-area-inset-bottom)}
}

/* === AI TOOLS === */
.ai-spinner{display:inline-block;width:40px;height:40px;border:3px solid var(--bd);border-top-color:var(--p);border-radius:50%;animation:ai-spin .8s linear infinite}
@keyframes ai-spin{to{transform:rotate(360deg)}}
.ai-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;margin-bottom:24px}
.ai-card{background:rgba(26,29,55,0.06);border-radius:12px;padding:20px;text-align:center;cursor:pointer;transition:all .2s;border:2px solid var(--bd);position:relative;overflow:hidden}
.ai-card:hover{border-color:var(--p);transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.ai-card.active{border-color:var(--p);background:var(--ps)}
.ai-card-icon{font-size:36px;margin-bottom:10px}
.ai-card-title{font-weight:700;font-size:14px;margin-bottom:4px;color:#e2e8f0}
.ai-card-desc{font-size:11px;color:var(--b)}
.ai-card-badge{position:absolute;top:8px;right:8px;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;background:var(--ps);color:var(--p)}
.ai-panel{background:rgba(26,29,55,0.06);border-radius:12px;padding:24px;box-shadow:var(--shadow)}
.ai-output{min-height:200px;padding:16px;background:#0a0e17;border-radius:10px;border:1px solid var(--bd);margin-top:16px;font-size:14px;line-height:1.8;white-space:pre-wrap;word-break:break-word}
.cw-types{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.cw-type{padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--bd);background:rgba(26,29,55,0.06);color:var(--b);transition:all .15s}
.cw-type:hover{border-color:var(--p);color:var(--p)}
.cw-type.active{background:var(--p);color:var(--w);border-color:var(--p)}
.ai-btn{width:100%;padding:12px;background:var(--p);color:var(--w);border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
.ai-btn:hover{background:var(--ph)}
.ai-back{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:#0a0e17;border:1.5px solid var(--bd);border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;color:var(--b);transition:all .15s;margin-bottom:16px}
.ai-back:hover{border-color:var(--p);color:var(--p)}
body{font-family:var(--f);color:#e2e8f0;background:var(--bg);line-height:1.6;overflow-x:hidden}
a{color:var(--p);text-decoration:none}
input,select,textarea,button{font-family:var(--f)}

.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#00f5ff 0%,#7c6cf6 50%,#a78bfa 100%);padding:20px}
.login-box{background:rgba(26,29,55,0.06);border-radius:20px;padding:40px 36px;width:100%;max-width:420px;box-shadow:var(--shadow-lg)}
.login-logo{text-align:center;margin-bottom:24px}
.login-logo img{width:64px;height:64px;border-radius:50%;border:3px solid var(--pl);margin-bottom:12px}
.login-logo h1{font-size:22px;font-weight:900;color:#e2e8f0}
.login-logo p{font-size:13px;color:var(--b);margin-top:4px}
.login-box h2{font-size:18px;font-weight:700;margin-bottom:24px;text-align:center}
.fg{margin-bottom:16px}
.fl{display:block;font-size:12px;font-weight:600;color:var(--b);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.fi{width:100%;padding:11px 14px;border:1.5px solid var(--bd);border-radius:var(--radius);font-size:14px;color:#e2e8f0;background:rgba(26,29,55,0.06);outline:none;transition:all .2s}
.fi:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(83,58,253,.12)}
.btn-p{width:100%;padding:12px;background:var(--p);color:var(--w);border:none;border-radius:var(--radius);font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;position:relative}
.btn-p:hover{background:var(--ph)}
.btn-p.loading{pointer-events:none;opacity:.7}
.btn-p.loading::after{content:'';position:absolute;right:16px;top:50%;margin-top:-8px;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#e2e8f0;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.app{display:none;height:100vh;overflow:hidden}
.app.active{display:grid;grid-template-columns:var(--sidebar) 1fr;grid-template-rows:var(--topbar) 1fr}

.sidebar{grid-row:1/-1;background:#060a12;color:rgba(255,255,255,.6);overflow-y:auto;display:flex;flex-direction:column;transition:transform .3s;z-index:200;padding-bottom:20px}
.sb-header{padding:20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(255,255,255,.14)}
.sb-header img{width:40px;height:40px;border-radius:50%;border:2px solid rgba(255,255,255,.2)}
.sb-header h2{font-size:15px;font-weight:700}
.sb-header span{font-size:11px;opacity:.6;display:block;margin-top:2px}
.sb-nav{flex:1;padding:12px 0}
.sb-group{padding:16px 20px 6px;font-size:10px;text-transform:uppercase;letter-spacing:1px;opacity:.4;font-weight:600}
.sb-item{display:flex;align-items:center;gap:12px;padding:9px 20px;color:rgba(255,255,255,.7);cursor:pointer;transition:all .15s;font-size:13px;font-weight:500;border-left:3px solid transparent}
.sb-item:hover{background:rgba(0,245,255,.1);color:#00f5ff;transform:translateX(4px)}
.sb-item.active{background:rgba(0,245,255,.15);color:#00f5ff;border-left-color:#00f5ff;font-weight:600}
.sb-item i{font-size:16px;width:20px;text-align:center}
.sb-footer{padding:16px 20px;border-top:1px solid rgba(255,255,255,.14);font-size:11px;opacity:.4;text-align:center}

.topbar{background:rgba(26,29,55,0.06);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;padding:0 24px;grid-column:2;height:var(--topbar)}
.tb-left{display:flex;align-items:center;gap:16px}
.tb-left h3{font-size:16px;font-weight:700}
.tb-right{display:flex;align-items:center;gap:12px}
.tb-user{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:500;color:var(--l)}
.tb-avatar{width:32px;height:32px;border-radius:50%;background:var(--ps);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--p)}
.tb-btn{padding:6px 14px;border:1.5px solid var(--bd);background:rgba(26,29,55,0.06);border-radius:8px;font-size:12px;font-weight:500;color:var(--b);cursor:pointer;transition:all .15s}
.tb-btn:hover{border-color:var(--p);color:var(--p)}
.tb-btn.danger:hover{border-color:var(--err);color:var(--err)}
.tb-toggle{display:none;padding:6px 10px;border:1.5px solid var(--bd);background:rgba(26,29,55,0.06);border-radius:8px;cursor:pointer;font-size:16px;color:var(--b)}

.main{grid-column:2;overflow-y:auto;padding:24px;background:#0a0e17}

.card{background:rgba(26,29,55,0.06);border-radius:12px;box-shadow:var(--shadow);margin-bottom:20px;overflow:hidden}
.card-header{padding:14px 24px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;min-height:56px}
.card-header h3{font-size:15px;font-weight:700}
.card-body{padding:20px}

.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:20px;text-align:left;align-items:stretch}
.stat-card{background:rgba(26,29,55,0.06);border-radius:12px;box-shadow:var(--shadow);padding:20px;display:flex;align-items:center;gap:16px;transition:transform .15s}
.stat-card:hover{transform:translateY(-2px)}
.stat-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;color:#e2e8f0}
.stat-info h4{font-size:24px;font-weight:900;line-height:1.2}
.stat-info p{font-size:12px;color:var(--b);margin-top:2px}

.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse}
th{background:#0a0e17;padding:10px 14px;text-align:left;font-size:12px;font-weight:600;color:var(--b);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--bd);white-space:nowrap}
td{padding:12px 14px;border-bottom:1px solid var(--bd);font-size:13px;vertical-align:middle}
tr:hover td{background:var(--ps)}
.badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600}
.badge-green{background:#dcfce7;color:#166534}
.badge-blue{background:#141c2e;color:#1e40af}
.badge-red{background:#fee2e2;color:#991b1b}
.badge-purple{background:#ede9fe;color:#5b21b6}
.badge-yellow{background:#fef3c7;color:#92400e}
.badge-orange{background:#ffedd5;color:#9a3412}
.badge-rose{background:#ffe4e6;color:#9f1239}
.badge-amber{background:#fbbf24;color:#78350f;font-weight:700}
.badge-gray{background:#0f1623;color:#64748b}

.act-btn{padding:5px 10px;border:none;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;margin-right:4px;color:#e2e8f0}
.act-btn.edit{background:#3b82f6}
.act-btn.del{background:#ef4444}
.act-btn.view{background:#7c3aed}
.act-btn.ok{background:#22c55e}
.act-btn:hover{opacity:.8;transform:translateY(-1px)}
.act-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

.mod-tag{display:inline-block;padding:4px 10px;border-radius:8px;font-size:12px;font-weight:600;color:#e2e8f0}
.empty{text-align:center;padding:60px 20px;color:var(--b)}
.empty i{font-size:48px;margin-bottom:12px;display:block;color:var(--bd)}

.toast{position:fixed;top:20px;right:20px;background:var(--n);color:#e2e8f0;padding:12px 20px;border-radius:10px;font-size:13px;z-index:9999;opacity:0;transform:translateY(-10px);transition:all .3s;pointer-events:none;max-width:360px;box-shadow:var(--shadow-lg)}
.toast.show{opacity:1;transform:translateY(0)}
.toast.success{background:var(--ok)}.toast.error{background:var(--err)}.toast.warning{background:var(--warn)}

.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:999;align-items:center;justify-content:center;padding:20px}
.modal-bg.show{display:flex}
.modal-box{background:rgba(26,29,55,0.06);border-radius:16px;padding:24px;width:100%;max-width:500px;max-height:80vh;overflow-y:auto;animation:mIn .2s ease}
@keyframes mIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.modal-box h3{font-size:17px;font-weight:700;margin-bottom:16px}
.modal-actions{display:flex;gap:10px;margin-top:20px}
.modal-actions button{flex:1;padding:10px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:var(--f)}
.m-cancel{background:#0a0e17;color:#e2e8f0}.m-confirm{background:var(--p);color:var(--w)}

.mod-detail-card{border:1px solid var(--bd);border-radius:12px;padding:20px;margin-bottom:16px}
.mod-detail-card h4{font-size:15px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.mod-detail-card p{font-size:13px;color:var(--b);line-height:1.7}
.svc-count{display:inline-flex;align-items:center;justify-content:center;background:var(--ps);color:var(--p);font-size:12px;font-weight:700;padding:2px 8px;border-radius:6px}

/* Filters */
.filter-bar{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:20px}
.filter-bar input,.filter-bar select{padding:8px 12px;border:1px solid var(--bd);border-radius:8px;font-size:13px;outline:none}
.filter-bar input:focus,.filter-bar select:focus{border-color:var(--p)}
.filter-bar input{flex:1;min-width:160px}

/* Pagination */
.pagination{display:flex;align-items:center;justify-content:space-between;padding:12px 0;flex-wrap:wrap;gap:8px}
.pagination .pg-info{font-size:12px;color:var(--b)}
.pagination .pg-btns{display:flex;gap:4px}
.pg-btn{padding:6px 12px;border:1px solid var(--bd);background:rgba(26,29,55,0.06);border-radius:6px;font-size:12px;cursor:pointer;transition:all .15s;color:#e2e8f0}
.pg-btn:hover{border-color:var(--p);color:var(--p)}
.pg-btn.active{background:var(--p);color:#e2e8f0;border-color:var(--p)}
.pg-btn:disabled{opacity:.4;cursor:not-allowed}

/* Status flow */
.status-flow{display:flex;align-items:center;gap:4px;margin:8px 0}
.status-step{display:flex;align-items:center;gap:4px;font-size:11px;padding:4px 8px;border-radius:6px;background:#0a0e17;color:var(--b)}
.status-step.done{background:#dcfce7;color:#166534}
.status-step.current{background:#141c2e;color:#1e40af;font-weight:600}
.status-step.rejected{background:#fee2e2;color:#991b1b}
.status-arrow{color:var(--bd);font-size:10px}

/* Batch bar */
.batch-bar{display:flex;gap:8px;align-items:center;padding:10px 16px;background:#141c2e;border-radius:8px;margin-bottom:12px;font-size:13px;color:#1e40af}
.batch-bar .sel-count{font-weight:700;margin-right:8px}

/* Toolbar */
.toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.toolbar .tb-btn i{margin-right:4px}

/* Login lockout */
.lockout-box{text-align:center;padding:20px;background:#fee2e2;border-radius:12px;color:#991b1b}
.lockout-box i{font-size:32px;margin-bottom:8px}


/* ===== 后端科技感样式 ===== */
html{scrollbar-color:rgba(255,255,255,.18) rgba(255,255,255,.02)}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:rgba(255,255,255,.02)}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.18);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.2)}

.sidebar .sb-item:hover{background:rgba(0,245,255,.1)!important;color:#00f5ff!important}
.sidebar .sb-item.active{background:rgba(0,245,255,.12)!important;color:#00f5ff!important;border-left:3px solid #00f5ff!important}

.card{backdrop-filter:blur(8px)!important;background:rgba(255,255,255,.04)!important;border:1px solid rgba(255,255,255,.14)!important;border-radius:12px!important;transition:all .3s ease!important}
.card:hover{border-color:rgba(0,245,255,.15)!important;box-shadow:0 0 20px rgba(0,245,255,.08)!important}

.stat-card{backdrop-filter:blur(8px);background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.14);border-radius:12px;transition:all .3s ease;display:flex;align-items:center;gap:16px;padding:18px 20px}
.stat-card:hover{transform:translateY(-2px);box-shadow:0 0 20px rgba(0,245,255,.1)}

.btn,.btn-primary{background:linear-gradient(135deg,rgba(0,245,255,.2),rgba(139,92,246,.2))!important;border:1px solid rgba(0,245,255,.2)!important;color:#e2e8f0!important;font-weight:600;transition:all .3s ease!important;cursor:pointer}

<div id="pageLoader"><div class="loader-logo">罗圣纪元 · 后台</div><div class="loader-bar"><div class="loader-bar-inner"></div></div><div class="loader-text">正在加载管理后台...</div>

<script>
/* P0: 确保loader在任何情况下都能被隐藏 */
function _hideLoader(){document.querySelectorAll('#pageLoader,.loader,.loading,.mask,.loading-mask').forEach(function(el){el.style.display='none'})}
function _checkLogin(){
  try{
    var u=JSON.parse(localStorage.getItem('lsjy3_cur')||'null');
    var a=JSON.parse(localStorage.getItem('lsjy3_admin')||'null');
    var roles=['admin','super_admin','supreme_admin','boss'];
    if(a&&a.isLogin&&u&&u.role&&roles.indexOf(u.role)>=0){
      document.getElementById('loginPage').style.display='none';
      document.getElementById('app').classList.add('active');
      document.body.style.visibility='visible';
      _hideLoader();
    }else{
      var lp=document.getElementById('loginPage');
      if(lp)lp.style.display='';
      var app=document.getElementById('app');
      if(app)app.classList.remove('active');
      _hideLoader();
    }
  }catch(e){
    _hideLoader();
    var lp=document.getElementById('loginPage');
    if(lp)lp.style.display='';
  }
}
document.readyState==='loading'?document.addEventListener('DOMContentLoaded',_checkLogin):_checkLogin();

/* 访客实时统计 - 精确到秒 */
(function(){
  function _updateVisitor(){
    var vc=document.getElementById('adminVisitorCount');
    var vt=document.getElementById('adminVisitTime');
    if(!vc||!vt)return;
    var visits=parseInt(localStorage.getItem('lsjy_admin_visits')||'0');
    var now=new Date();
    var timeStr=now.getFullYear()+'-'+
      String(now.getMonth()+1).padStart(2,'0')+'-'+
      String(now.getDate()).padStart(2,'0')+' '+
      String(now.getHours()).padStart(2,'0')+':'+
      String(now.getMinutes()).padStart(2,'0')+':'+
      String(now.getSeconds()).padStart(2,'0');
    vc.textContent='访客: '+visits;
    vt.textContent=timeStr;
  }
  // 首次更新
  setTimeout(_updateVisitor,500);
  // 每秒更新
  setInterval(_updateVisitor,1000);
  // 记录当前访问
  var v=parseInt(localStorage.getItem('lsjy_admin_visits')||'0');
  localStorage.setItem('lsjy_admin_visits',String(v+1));
})();

/* 退出登录 - 全局可用，不依赖任何其他函数 */
window.doLogout=function(){
  localStorage.removeItem('lsjy3_admin');
  localStorage.removeItem('lsjy3_cur');
  localStorage.removeItem('lsjy_admin_logs');
  var lp=document.getElementById('loginPage');
  var app=document.getElementById('app');
  if(lp)lp.style.display='';
  if(app)app.classList.remove('active');
  document.querySelectorAll('#pageLoader,.loader,.loading,.mask,.loading-mask').forEach(function(el){el.style.display='none'});
  document.body.style.visibility='visible';
  var inputs=document.querySelectorAll('#loginPage input');
  inputs.forEach(function(inp){inp.value='';});
  var userInput=document.getElementById('loginUser');
  if(userInput)setTimeout(function(){userInput.focus()},100);
};

/* 头像和昵称更新 - 立即应用自定义设置 */
window._refreshProfile=function(){
  try{
    var u=JSON.parse(localStorage.getItem('lsjy3_cur')||'null');
    var customName=localStorage.getItem('admin_custom_name')||'';
    var customAvatar=localStorage.getItem('admin_custom_avatar')||'';
    var av=document.getElementById('tbAvatar');
    var nm=document.getElementById('tbName');
    if(av){
      if(customAvatar){
        av.innerHTML='<img src="'+customAvatar+'" style="width:100%;height:100%;border-radius:50%;object-fit:cover">';
      }else{
        av.textContent=(customName||(u&&u.nickname)||(u&&u.username)||'A')[0].toUpperCase();
      }
    }
    if(nm)nm.textContent=customName||(u&&u.nickname)||(u&&u.username)||'Admin';
  }catch(e){}
};
// 页面加载后立即刷新一次
setTimeout(_refreshProfile,200);
</script>

// ===== Crypto (simple XOR + Base64) =====
const _CK='lsjy2026secure';
function encryptPwd(p){const e=[];for(let i=0;i<p.length;i++)e.push(p.charCodeAt(i)^_CK.charCodeAt(i%_CK.length));return btoa(e.join(','))}
function decryptPwd(c){if(!c)return'';if(c.length<20&&c.indexOf(',')===-1)return c;try{const a=atob(c).split(',').map(Number);if(a.some(isNaN))return c;let s='';for(let i=0;i<a.length;i++)s+=String.fromCharCode(a[i]^_CK.charCodeAt(i%_CK.length));return s}catch(e){return c}}

function paginate(arr,page,size){const total=Math.ceil(arr.length/size);return{data:arr.slice((page-1)*size,page*size),page,total,allCount:arr.length}}
function renderPagination(pg,onChangeFn){
  if(pg.total<=1)return`<div class="pagination"><div class="pg-info">共 ${pg.allCount} 条</div></div>`;
  let btns=`<button class="pg-btn" onclick="${onChangeFn}(${pg.page-1})" ${pg.page<=1?'disabled':''}><i class="fa-solid fa-chevron-left"></i></button>`;
  const start=Math.max(1,pg.page-2),end=Math.min(pg.total,pg.page+2);
  if(start>1)btns+=`<button class="pg-btn" onclick="${onChangeFn}(1)">1</button>`;
  if(start>2)btns+=`<span style="color:var(--b)">...</span>`;
  for(let i=start;i<=end;i++)btns+=`<button class="pg-btn${i===pg.page?' active':''}" onclick="${onChangeFn}(${i})">${i}</button>`;
  if(end<pg.total-1)btns+=`<span style="color:var(--b)">...</span>`;
  if(end<pg.total)btns+=`<button class="pg-btn" onclick="${onChangeFn}(${pg.total})">${pg.total}</button>`;
  btns+=`<button class="pg-btn" onclick="${onChangeFn}(${pg.page+1})" ${pg.page>=pg.total?'disabled':''}><i class="fa-solid fa-chevron-right"></i></button>`;
  return`<div class="pagination"><div class="pg-info">共 ${pg.allCount} 条 / 第 ${pg.page}/${pg.total} 页</div><div class="pg-btns">${btns}</div></div>`;
}

      ${contacts.length?contacts.slice(-5).reverse().map(c=>`<div style="padding:10px 0;border-bottom:1px solid var(--bd)">

    ${users.length?`<div class="table-wrap"><table><tr><th>用户名</th><th>昵称</th><th>手机号</th><th>角色</th><th>注册时间</th></tr>
      ${users.slice(-5).reverse().map(u=>`<tr><td style="font-weight:600">${u.username}</td><td>${maskName(u.nickname)}</td><td>${maskPhone(u.phone)}</td><td>${roleBadge(u.role)}</td><td style="color:var(--b)">${fmtDate(u.created)}</td></tr>`).join('')}
    </table></div>`:'<div class="empty"><i class="fa-solid fa-users"></i><p>暂无用户</p></div>'}
  </div></div>`;

  // ===== 绘制数据趋势图表 =====
  setTimeout(function(){
    var canvas=document.getElementById('dashChart');
    if(!canvas)return;
    var ctx=canvas.getContext('2d');
    var dpr=window.devicePixelRatio||1;
    var rect=canvas.getBoundingClientRect();
    canvas.width=rect.width*dpr;canvas.height=rect.height*dpr;
    ctx.scale(dpr,dpr);
    var w=rect.width,h=rect.height;
    var pad={top:20,right:20,bottom:40,left:50};
    var cw=w-pad.left-pad.right,ch=h-pad.top-pad.bottom;
    // 生成近7天数据
    var labels=[];var msgData=[];var userData=[];
    for(var d=6;d>=0;d--){
      var dt=new Date();dt.setDate(dt.getDate()-d);
      var ds=dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');
      labels.push((dt.getMonth()+1)+'/'+dt.getDate());
      msgData.push(contacts.filter(function(c){return c.time&&c.time.includes(ds)}).length);
      userData.push(Math.floor(Math.random()*5)+1);
    }
    var maxV=Math.max.apply(null,msgData.concat(userData))*1.2||10;
    // 坐标轴
    ctx.strokeStyle='rgba(26,29,55,0.12)';ctx.lineWidth=1;
    ctx.fillStyle='rgba(255,255,255,0.4)';ctx.font='11px sans-serif';
    for(var i=0;i<=4;i++){
      var y=pad.top+ch-(ch/4)*i;
      ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(w-pad.right,y);ctx.stroke();
      ctx.fillText(Math.round(maxV/4*i),5,y+4);
    }
    for(var i=0;i<labels.length;i++){
      var x=pad.left+(cw/(labels.length-1))*i;
      ctx.fillText(labels[i],x-12,h-10);
    }
    // 消息折线（电光蓝）
    ctx.beginPath();ctx.strokeStyle='#00f5ff';ctx.lineWidth=2;
    var grad=ctx.createLinearGradient(0,pad.top,0,pad.top+ch);
    grad.addColorStop(0,'rgba(0,245,255,0.3)');grad.addColorStop(1,'rgba(0,245,255,0)');
    for(var i=0;i<msgData.length;i++){
      var x=pad.left+(cw/(msgData.length-1))*i;
      var y=pad.top+ch-(msgData[i]/maxV)*ch;
      if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
    }
    ctx.stroke();
    // 折线下方填充
    ctx.lineTo(pad.left+cw,pad.top+ch);ctx.lineTo(pad.left,pad.top+ch);ctx.closePath();
    ctx.fillStyle=grad;ctx.fill();
    // 消息数据点
    for(var i=0;i<msgData.length;i++){
      var x=pad.left+(cw/(msgData.length-1))*i;
      var y=pad.top+ch-(msgData[i]/maxV)*ch;
      ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fillStyle='#00f5ff';ctx.fill();
      ctx.beginPath();ctx.arc(x,y,2,0,Math.PI*2);ctx.fillStyle='#0f1623';ctx.fill();
    }
    // 用户柱状图（紫色）
    var barW=cw/msgData.length*0.4;
    for(var i=0;i<userData.length;i++){
      var x=pad.left+(cw/(userData.length-1))*i-barW/2;
      var bh=(userData[i]/maxV)*ch;
      var y=pad.top+ch-bh;
      var barGrad=ctx.createLinearGradient(0,y,0,pad.top+ch);
      barGrad.addColorStop(0,'rgba(139,92,246,0.8)');barGrad.addColorStop(1,'rgba(139,92,246,0.2)');
      ctx.fillStyle=barGrad;
      ctx.beginPath();ctx.roundRect(x,y,barW,bh,3);ctx.fill();
    }
    // 图例
    ctx.fillStyle='#00f5ff';ctx.fillRect(w-140,8,12,3);
    ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='11px sans-serif';ctx.fillText('消息量',w-124,14);
    ctx.fillStyle='#8b5cf6';ctx.fillRect(w-70,8,12,3);
    ctx.fillStyle='rgba(255,255,255,0.5)';ctx.fillText('用户数',w-54,14);
  },100);
}

const ROLE_MAP={admin:{label:'管理员',badge:'badge-purple'},super_admin:{label:'超级管理员',badge:'badge-rose'},supreme_admin:{label:'至尊管理员',badge:'badge-orange'},boss:{label:'罗总专属',badge:'badge-amber'},user:{label:'用户',badge:'badge-blue'}};
function roleBadge(role){const r=ROLE_MAP[role]||ROLE_MAP.user;return '<span class="badge '+r.badge+'">'+r.label+'</span>'}
function roleLabel(role){return(ROLE_MAP[role]||ROLE_MAP.user).label}

let _uPage=1,_uKw='',_uSel=new Set();
function renderUsers(p){
  if(typeof p==='number')_uPage=p;_uSel=new Set();
  const users=getUsers();
  const filtered=filterByKeyword(users,['username','nickname','phone','role'],_uKw);
  const pg=paginate(filtered,_uPage,10);
  document.getElementById('mainContent').innerHTML=`
  <div class="stats">
    <div class="stat-card"><div class="stat-icon" style="background:linear-gradient(135deg,#00f5ff,#7c6cf6)"><i class="fa-solid fa-users"></i></div><div class="stat-info"><h4>${users.length}</h4><p>总用户数</p></div></div>
    <div class="stat-card"><div class="stat-icon" style="background:linear-gradient(135deg,#10b981,#34d399)"><i class="fa-solid fa-user-shield"></i></div><div class="stat-info"><h4>${users.filter(u=>['admin','super_admin','supreme_admin','boss'].includes(u.role)).length}</h4><p>管理员</p></div></div>
    <div class="stat-card"><div class="stat-icon" style="background:linear-gradient(135deg,#3b82f6,#60a5fa)"><i class="fa-solid fa-user"></i></div><div class="stat-info"><h4>${users.filter(u=>!['admin','super_admin','supreme_admin','boss'].includes(u.role)).length}</h4><p>普通用户</p></div></div>
  </div>

    <div class="toolbar">
      <button class="tb-btn" onclick="openAddUser()"><i class="fa-solid fa-plus"></i> 新增</button>
      <button class="tb-btn" onclick="exportUsers()"><i class="fa-solid fa-file-csv"></i> 导出</button>
      <button class="tb-btn" id="batchDelUsersBtn" style="display:none" onclick="batchDelUsers()"><i class="fa-solid fa-trash"></i> 批量删除</button>
    </div>
  </div><div class="card-body">
    <div class="filter-bar">
      <input type="text" placeholder="搜索用户名/昵称/手机号..." value="${_uKw}" oninput="_uKw=this.value;_uPage=1;renderUsers()">
    </div>
    <div id="batchBarU"></div>
    <div class="table-wrap"><table>
      <tr><th><input type="checkbox" onchange="toggleAllUsers(this.checked)"></th><th>用户名</th><th>昵称</th><th>手机号</th><th>角色</th><th>注册时间</th><th>操作</th></tr>
      ${pg.data.map((u,i)=>{
        const ri=(i+(_uPage-1)*10);
        return`<tr><td><input type="checkbox" value="${ri}" onchange="toggleUserSel(this)"></td>
        <td style="font-weight:600">${u.username}</td><td>${maskName(u.nickname)}</td><td>${maskPhone(u.phone)}</td>
        <td>${roleBadge(u.role)}</td>
        <td style="color:var(--b)">${fmtDate(u.created)}</td>
        <td><button class="act-btn edit" onclick="openEditUser(${ri})"><i class="fa-solid fa-pen"></i></button>${u.username!=='admin'?`<button class="act-btn del" onclick="delUser(${ri})"><i class="fa-solid fa-trash"></i></button>`:''}</td></tr>`
      }).join('')}
    </table></div>
    ${!pg.data.length?'<div class="empty"><i class="fa-solid fa-users"></i><p>暂无用户</p></div>':''}
    ${renderPagination(pg,'renderUsers')}
  </div></div>`;
}
function toggleAllUsers(checked){document.querySelectorAll('#mainContent table input[type=checkbox]').forEach((cb,i)=>{if(i>0)cb.checked=checked});updateBatchBarU()}
function toggleUserSel(cb){updateBatchBarU()}
function updateBatchBarU(){
  const cbs=document.querySelectorAll('#mainContent table input[type=checkbox]:checked');
  const bar=document.getElementById('batchBarU');
  const btn=document.getElementById('batchDelUsersBtn');
  if(cbs.length>0){bar.innerHTML=`<div class="batch-bar"><span class="sel-count">已选 ${cbs.length} 项</span><button class="act-btn del" onclick="batchDelUsers()"><i class="fa-solid fa-trash"></i> 批量删除</button></div>`}
  else{bar.innerHTML=''}
}
function batchDelUsers(){
  const cbs=document.querySelectorAll('#mainContent table input[type=checkbox]:checked');
  if(!cbs.length)return;const users=getUsers();const indices=[...cbs].map(cb=>parseInt(cb.value)).sort((a,b)=>b-a);
  if(!confirm('确认删除选中的 '+indices.length+' 个用户？将移入回收站'))return;
  indices.forEach(i=>{if(users[i]&&users[i].username!=='admin')softDelete('user',users.splice(i,1)[0])});
  saveUsers(users);renderUsers();addOpLog('批量删除用户',indices.length+'个');toast('已删除 '+indices.length+' 个用户，可在回收站恢复','success');
}
function exportUsers(){
  const users=getUsers();
  const csv=toCSV(users.map(u=>[u.username,u.nickname||'',maskPhone(u.phone),u.role,u.created||'']),['用户名','昵称','手机号','角色','注册时间']);
  downloadCSV(csv,'用户列表_'+new Date().toISOString().slice(0,10));toast('导出成功','success');
}
function openAddUser(){showMod(`<h3><i class="fa-solid fa-user-plus" style="color:var(--p)"></i> 新增用户</h3>
  <div class="fg"><label class="fl">用户名</label><input class="fi" id="mUser" placeholder="3个字符以上"></div>
  <div class="fg"><label class="fl">昵称</label><input class="fi" id="mNick" placeholder="选填"></div>
  <div class="fg"><label class="fl">密码</label><input class="fi" type="password" id="mPwd" placeholder="6个字符以上"></div>
  <div class="fg"><label class="fl">角色</label><select class="fi" id="mRole"><option value="user">普通用户</option><option value="admin">管理员</option><option value="super_admin">超级管理员</option><option value="supreme_admin">至尊管理员</option><option value="boss">罗总专属</option></select></div>
  <div class="modal-actions"><button class="m-cancel" onclick="closeModal()">取消</button><button class="m-confirm" id="addUserBtn" onclick="addUser()">创建</button></div>`)}
function addUser(){
  const u=document.getElementById('mUser').value.trim(),n=document.getElementById('mNick').value.trim(),p=document.getElementById('mPwd').value,r=document.getElementById('mRole').value;
  const ld=btnLoading(document.getElementById('addUserBtn'));if(!ld)return;
  if(u.length<3){ld.done();return toast('用户名至少3个字符','error')}
  if(p.length<6){ld.done();return toast('密码至少6个字符','error')}
  const users=getUsers();if(users.find(x=>x.username===u)){ld.done();return toast('用户名已存在','error')}
  users.push({username:u,password:encryptPwd(p),nickname:n,role:r,created:new Date().toLocaleString()});
  saveUsers(users);ld.done();closeModal();renderUsers();addOpLog('新增用户',u);toast('用户创建成功','success');
}
function openEditUser(idx){
  const users=getUsers(),u=users[idx];if(!u)return;
  showMod(`<h3><i class="fa-solid fa-user-pen" style="color:var(--p)"></i> 编辑用户: ${u.username}</h3>
    <div class="fg"><label class="fl">昵称</label><input class="fi" id="mNick" value="${u.nickname||''}"></div>
    <div class="fg"><label class="fl">新密码（留空不修改）</label><input class="fi" type="password" id="mPwd" placeholder="留空则不修改"></div>
    <div class="fg"><label class="fl">角色</label><select class="fi" id="mRole"><option value="user" ${u.role==='user'?'selected':''}>普通用户</option><option value="admin" ${u.role==='admin'?'selected':''}>管理员</option><option value="super_admin" ${u.role==='super_admin'?'selected':''}>超级管理员</option><option value="supreme_admin" ${u.role==='supreme_admin'?'selected':''}>至尊管理员</option><option value="boss" ${u.role==='boss'?'selected':''}>罗总专属</option></select></div>
    <div class="modal-actions"><button class="m-cancel" onclick="closeModal()">取消</button><button class="m-confirm" id="saveUserBtn" onclick="saveEditUser(${idx})">保存</button></div>`)}
function saveEditUser(idx){
  const ld=btnLoading(document.getElementById('saveUserBtn'));if(!ld)return;
  const users=getUsers();const u=users[idx];
  u.nickname=document.getElementById('mNick').value.trim();
  const p=document.getElementById('mPwd').value;if(p){if(p.length<6){ld.done();return toast('密码至少6个字符','error')}u.password=encryptPwd(p)}
  u.role=document.getElementById('mRole').value;saveUsers(users);ld.done();closeModal();renderUsers();addOpLog('编辑用户',u.username);toast('用户信息已更新','success');
}
function delUser(idx){
  const users=getUsers(),u=users[idx];

function confirmOrder(idx){
  if(!confirm('确认已收到付款并开通服务？'))return;
  const orders=getOrders();if(!orders[idx])return;const o=orders[idx];
  if(o.moduleId==='credits'){
    const targetUser=prompt('请输入充值用户名 (当前: '+(o.username||'未指定')+'):',o.username||'');
    if(!targetUser)return;const packs=[{id:'pack1',credits:100},{id:'pack2',credits:500},{id:'pack3',credits:2000},{id:'pack4',credits:5000},{id:'pack5',credits:10000}];
    const pack=packs.find(p=>p.id===o.serviceId);const addCredits=pack?pack.credits:0;
    if(addCredits>0){const all=getAllCredits();all[targetUser]=(all[targetUser]||0)+addCredits;saveAllCredits(all)}
    o.confirmedUser=targetUser;
  }
  o.status='paid';orders[idx]=o;saveOrders(orders);toast('订单确认成功，服务已开通！','success');renderOrders();
}
function rejectOrder(idx){
  if(!confirm('确认拒绝此订单？'))return;
  const orders=getOrders();if(!orders[idx])return;orders[idx].status='rejected';saveOrders(orders);toast('订单已拒绝','warn');renderOrders();

  const inp=document.getElementById('manualCredit_'+username);const val=parseInt(inp.value);
  if(!val||val<=0)return toast('请输入有效的算力数量','error');
  if(!confirm('给 '+username+' 充值 '+val+' 算力？'))return;
  const all=getAllCredits();all[username]=(all[username]||0)+val;saveAllCredits(all);inp.value='';toast('已为 '+username+' 充值 '+val+' 算力','success');renderOrders();
}

function restoreItem(idx){
  const r=getRecycle();const item=r[idx];if(!item)return;

  r.splice(idx,1);saveRecycle(r);renderRecycle();toast('已恢复','success');

function permDelItem(idx){

async function doubaoChat(prompt, sysPrompt, model, retries) {

async function doubaoImage(prompt, w, h) {

}

async function aiGenerateText(prompt,sysPrompt,model,retries){
  retries=retries||2;let lastErr=null;
  // 优先使用豆包API（前端直连火山引擎）
  if(DOUBAO_CONFIG.ENABLED){
    const result=await doubaoChat(prompt,sysPrompt||'你是专业AI助手，回复只包含生成内容，不含解释。',model,retries);
    if(result)return result;
  }
  // 备用：Pollinations.ai
  for(let i=0;i<=retries;i++){
    try{
      const controller=new AbortController();
      const tid=setTimeout(()=>controller.abort(),AI_TIMEOUT);
      const r=await fetch(FALLBACK_AI_TEXT_API,{method:'POST',signal:controller.signal,headers:{'Content-Type':'application/json'},
        body:JSON.stringify({model:model||'openai-large',messages:[
          {role:'system',content:sysPrompt||'你是专业AI助手，回复只包含生成内容，不含解释。'},
          {role:'user',content:prompt}
        ],max_tokens:4000,temperature:0.9})});
      clearTimeout(tid);
      if(!r.ok){lastErr=new Error('HTTP '+r.status);if(i<retries)await new Promise(r=>setTimeout(r,1500*(i+1)));continue;}
      const d=await r.json();
      if(d.choices&&d.choices.length){const c=d.choices[0];if(c&&c.message&&c.message.content)return c.message.content.trim();}
      if(d.output&&d.output.length){const msg=d.output.filter(o=>o.type==='message').pop();if(msg&&msg.content&&msg.content.length)return msg.content[0].text.trim();}
      if(i<retries)await new Promise(r=>setTimeout(r,1500*(i+1)));
    }catch(e){lastErr=e;console.log('AI err (try '+i+'):',e);if(i<retries)await new Promise(r=>setTimeout(r,1500*(i+1)))}
  }
  return null;
}

function audioBufferToWav(buffer){
  const numCh=buffer.numberOfChannels,sr=buffer.sampleRate,len=buffer.length;
  const bps=16,byteRate=sr*numCh*bps/8,blockAlign=numCh*bps/8,dataLen=len*blockAlign;
  const ab=new ArrayBuffer(44+dataLen),v=new DataView(ab);
  const ws=(o,s)=>{for(let i=0;i<s.length;i++)v.setUint8(o+i,s.charCodeAt(i))};
  ws(0,'RIFF');v.setUint32(4,36+dataLen,true);ws(8,'WAVE');ws(12,'fmt ');
  v.setUint32(16,16,true);v.setUint16(20,1,true);v.setUint16(22,numCh,true);
  v.setUint32(24,sr,true);v.setUint32(28,byteRate,true);v.setUint16(32,blockAlign,true);
  v.setUint16(34,bps,true);ws(36,'data');v.setUint32(40,dataLen,true);
  const ch=[];for(let i=0;i<numCh;i++)ch.push(buffer.getChannelData(i));
  let off=44;
  for(let i=0;i<len;i++){for(let c=0;c<numCh;c++){const s=Math.max(-1,Math.min(1,ch[c][i]));v.setInt16(off,s<0?s*0x8000:s*0x7FFF,true);off+=2}}
  return ab;
}

function batchGenCodes(){
  const packId=document.getElementById('rcPack').value;
  const count=parseInt(document.getElementById('rcCount').value)||0;
  if(count<1||count>100)return toast('数量范围：1-100','error');
  let credits=0,price=0,packName='';
  if(packId==='custom'){
    credits=parseInt(document.getElementById('rcCustomCredits').value)||0;
    price=parseFloat(document.getElementById('rcCustomPrice').value)||0;
    if(credits<1)return toast('请输入有效算力数量','error');
    packName='自定义';
  }else{
    const pack=CREDIT_PACKS.find(p=>p.id===packId);
    if(!pack)return toast('请选择套餐','error');
    credits=pack.credits;price=pack.price;packName=pack.name;
  }
  const codes=[];
  const existing=getRedeemCodes();
  const existingSet=new Set(existing.map(c=>c.code));
  let attempts=0;
  while(codes.length<count&&attempts<count*10){
    const code=genCode();
    if(!existingSet.has(code)){codes.push({code,credits,price,packName,status:'unused',usedBy:null,usedAt:null,createdAt:new Date().toISOString(),note:''});existingSet.add(code)}
    attempts++;
  }
  if(codes.length<count){toast('已生成'+codes.length+'个（存在重复跳过）','warn')}
  const allCodes=existing.concat(codes);
  saveRedeemCodes(allCodes);
  const result=document.getElementById('genResult');
  const codeList=codes.map(c=>c.code).join('\n');
  result.innerHTML=`
    <div style="padding:16px;background:#dcfce7;border-radius:10px;margin-bottom:12px">
      <div style="font-weight:700;color:#166534;margin-bottom:8px"><i class="fa-solid fa-check-circle"></i> 成功生成 ${codes.length} 个卡密</div>
      <div style="font-size:12px;color:#166534">套餐：${packName} | 算力：${credits} | 单价：¥${price} | 总价值：¥${(price*codes.length).toFixed(1)}</div>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:8px">
      <button class="act-btn ok" onclick="navigator.clipboard.writeText(document.getElementById('codeListArea').value);toast('已复制全部卡密','success')"><i class="fa-solid fa-copy"></i> 复制全部</button>
    </div>
    <textarea id="codeListArea" rows="${Math.min(codes.length+1,10)}" style="width:100%;padding:10px;border:1px solid var(--bd);border-radius:8px;font-family:monospace;font-size:12px;background:#0a0e17" readonly>${codeList}</textarea>`;
  addOpLog('批量生成卡密',packName+' x'+codes.length);
  toast('成功生成 '+codes.length+' 个卡密','success');
  renderRedeemCodes();
}
function copyCode(code){navigator.clipboard.writeText(code);toast('已复制: '+code,'success')}
function delCode(idx){
  showMod(`<h3><i class="fa-solid fa-triangle-exclamation" style="color:var(--err)"></i> 删除卡密</h3><p>确定删除此卡密？</p><div class="modal-actions"><button class="m-cancel" onclick="closeModal()">取消</button><button class="m-confirm" style="background:var(--err)" onclick="cfmDelCode(${idx})">删除</button></div>`);
}
function cfmDelCode(idx){const codes=getRedeemCodes();const c=codes.splice(idx,1)[0];saveRedeemCodes(codes);addOpLog('删除卡密',c.code);closeModal();renderRedeemCodes();toast('卡密已删除','success')}
function batchDelCodes(){
  const codes=getRedeemCodes();const unused=codes.filter(c=>c.status==='unused');
  if(!unused.length)return toast('没有未使用的卡密','error');
  if(!confirm('确定删除全部 '+unused.length+' 个未使用的卡密？'))return;
  const used=codes.filter(c=>c.status==='used');
  saveRedeemCodes(used);addOpLog('批量删除卡密','删除 '+unused.length+' 个未使用');renderRedeemCodes();toast('已删除 '+unused.length+' 个未使用卡密','success');
}
function exportCodes(){
  const codes=getRedeemCodes();
  const csv=toCSV(codes.map(c=>[c.code,c.packName,c.credits,c.price,c.status==='unused'?'未使用':'已兑换',c.usedBy||'',c.note||'',fmtDate(c.createdAt)]),['卡密','套餐','算力','价格','状态','使用者','备注','生成时间']);
  downloadCSV(csv,'卡密列表_'+new Date().toISOString().slice(0,10));toast('导出成功','success');
}

function renderCustList(){
  const body=document.getElementById('custListBody');

  }).then(function(r){

    if(el)el.remove();
    _adminAIChat.push({role:'assistant',content:''});
    adminAIRender();
    return r.body.getReader();
  }).then(function(reader){
    var decoder=new TextDecoder();
    function read(){
      reader.read().then(function(result){
        if(result.done){
          _adminAISending=false;
          return;
        }
        var chunk=decoder.decode(result.value,{stream:true});
        var lines=chunk.split('\n');
        for(var li=0;li<lines.length;li++){
          var line=lines[li].trim();
          if(line.startsWith('data:')){
            var data=line.slice(5).trim();
            if(data==='[DONE]'){_adminAISending=false;return}
            try{
              var json=JSON.parse(data);
              if(json.choices&&json.choices[0]&&json.choices[0].delta&&json.choices[0].delta.content){
                _adminAIChat[_adminAIChat.length-1].content+=json.choices[0].delta.content;
                adminAIRender();
              }
            }catch(e){}
          }
        }
        read();
      });
    }
    read();
  }).catch(function(err){
    _adminAISending=false;
    var el=document.getElementById(loadId);
    if(el)el.innerHTML='<span style="color:var(--err)">请求失败: '+err.message+'</span>';
  });
}

    var pollTimer=setInterval(function(){
      attempts++;
      fetch(_ARK_BASE+'/contents/generations/tasks/'+taskId,{
        headers:{'Authorization':'Bearer '+getVolcengineKey()}
      }).then(function(r){return r.json()}).then(function(result){

          }else{
            out.innerHTML='<p style="color:var(--err);text-align:center">视频生成完成但未返回视频地址</p>';
          }
        }else if(result.status==='failed'){
          clearInterval(pollTimer);_adminVidPolling=false;
          btn.disabled=false;btn.textContent='🚀 开始生成视频';btn.style.opacity='1';
          out.innerHTML='<div style="text-align:center;padding:20px;background:#fef2f2;border-radius:12px"><p style="color:#ef4444;font-weight:600">视频生成失败</p><p style="color:#6b7280;font-size:12px;margin-top:4px">'+(result.error&&result.error.message||'请检查火山引擎控制台是否已开通Seedance模型')+'</p></div>';
        }
      }).catch(function(e){
        if(attempts>30){
          clearInterval(pollTimer);_adminVidPolling=false;
          btn.disabled=false;btn.textContent='🚀 开始生成视频';btn.style.opacity='1';
          var prog=document.getElementById('adminVidProgress');

    },10000);

  });
}

function toggleSidebar(){
  var sb=document.getElementById('sidebar');
  var mask=document.getElementById('sidebarMask');
  if(sb){sb.classList.toggle('open')}

}

// === 表单验证 ===
document.addEventListener('submit',function(e){
  var form=e.target;
  var inputs=form.querySelectorAll('[required]');
  var valid=true;
  inputs.forEach(function(inp){
    var hint=inp.parentElement.querySelector('.form-hint');
    if(!inp.value.trim()){
      inp.classList.add('error');
      if(hint){hint.textContent='此项为必填';hint.classList.add('error')}
      valid=false;
    }else{
      inp.classList.remove('error');
      if(hint){hint.textContent='';hint.classList.remove('error')}
    }
  });
  if(!valid){e.preventDefault();return false}
});

// === 下拉刷新 (手机端) ===
(function(){
  if(!/Mobi|Android/i.test(navigator.userAgent))return;
  var startY=0,pulling=false,ind=document.getElementById('pullIndicator');
  if(!ind)return;
  document.addEventListener('touchstart',function(e){startY=e.touches[0].pageY;if(window.scrollY<=0)pulling=true},{passive:true});
  document.addEventListener('touchmove',function(e){
    if(!pulling)return;
    var dy=e.touches[0].pageY-startY;
    if(dy>80&&ind)ind.classList.add('active');
  },{passive:true});
  document.addEventListener('touchend',function(){
    if(!pulling)return;pulling=false;
    if(ind)ind.classList.remove('active');
    setTimeout(function(){
      var page=document.querySelector('.page.active');
      if(page&&typeof page.dataset.fn==='string'&&typeof window[page.dataset.fn]==='function'){
        window[page.dataset.fn]();
      }else if(typeof renderDashboard==='function')renderDashboard();
      if(typeof toast==='function')toast('数据已刷新','success');
      else if(typeof showToast==='function')showToast('数据已刷新');
    },200);
  });
})();

function addLog(action,detail){var logs=JSON.parse(localStorage.getItem('lsjy_admin_logs')||'[]');logs.unshift({time:new Date().toLocaleString(),action:action,detail:detail||''});if(logs.length>100)logs.length=100;localStorage.setItem('lsjy_admin_logs',JSON.stringify(logs))}

// === 退出登录 ===
function doLogout(){
  localStorage.removeItem('lsjy3_admin');
  localStorage.removeItem('lsjy3_cur');
  localStorage.removeItem('lsjy_admin_logs');
  // 确保显示登录页，隐藏app
  var lp=document.getElementById('loginPage');
  var app=document.getElementById('app');
  if(lp)lp.style.display='';
  if(app)app.classList.remove('active');
  // 强制隐藏所有loader
  document.querySelectorAll('#pageLoader,.loader,.loading,.mask,.loading-mask').forEach(function(el){el.style.display='none'});
  document.body.style.visibility='visible';
  // 清空输入框
  var inputs=document.querySelectorAll('#loginPage input');
  inputs.forEach(function(inp){inp.value='';});
  // 聚焦到用户名输入框
  var userInput=document.getElementById('loginUser');
  if(userInput)setTimeout(function(){userInput.focus()},100);
}

// === 登录状态持久化检查 ===
(function(){
  var admin=localStorage.getItem('lsjy3_admin');
  if(!admin){
    var lp=document.getElementById('loginPage');
    var app=document.getElementById('app');
    if(lp)lp.style.display='';
    if(app)app.classList.remove('active');
    hideLoader();
    return;
  }
  try{
    var a=JSON.parse(admin);
    if(!a.isLogin){
      var lp=document.getElementById('loginPage');
      var app=document.getElementById('app');
      if(lp)lp.style.display='';
      if(app)app.classList.remove('active');
      hideLoader();
    }else{
      // 已登录，直接进入
      enterApp();
      hideLoader();
    }
  }catch(e){
    var lp=document.getElementById('loginPage');
    if(lp)lp.style.display='';
    hideLoader();
  }
})();
