<!DOCTYPE html>
<html lang="zh-CN" class="notranslate">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="google" content="notranslate">
<meta name="robots" content="notranslate">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,minimum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="format-detection" content="telephone=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="logo.png" type="image/png">
<title>罗圣纪元 - 后台管理系统 V7.0</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap');

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{
  --p:#00f5ff;--ph:#0ea5e9;--pl:#67e8f9;--ps:rgba(0,245,255,.08);
  --p2:#8b5cf6;--p2h:#7c3aed;--p2l:#c4b5fd;--p2s:rgba(139,92,246,.1);
  --n:#e2e8f0;--nd:#94a3b8;--b:#64748b;--l:#475569;--bd:rgba(255,255,255,.08);
  --bg:#0a0e17;--bg2:#0f1623;--bg3:#141c2e;
  --w:#e2e8f0;--w2:rgba(255,255,255,.05);
  --card:rgba(255,255,255,.04);--card-hover:rgba(255,255,255,.08);
  --ok:#10b981;--err:#f43f5e;--warn:#f59e0b;
  --shadow:0 4px 12px rgba(0,0,0,.3);
  --sidebar-bg:#060a12;--sidebar-active:rgba(0,245,255,.12);
  --sidebar-w:240px;--topbar-h:56px;
}

body.theme-light{
  --p:#0088cc;--ph:#0077b5;--pl:#48cae4;--ps:rgba(0,136,204,.08);
  --p2:#7c3aed;--p2h:#6d28d9;--p2l:#a78bfa;--p2s:rgba(124,58,237,.08);
  --n:#1e293b;--nd:#64748b;--b:#94a3b8;--l:#cbd5e1;--bd:rgba(0,0,0,.08);
  --bg:#f8fafc;--bg2:#ffffff;--bg3:#f1f5f9;
  --w:#1e293b;--w2:rgba(0,0,0,.05);
  --card:rgba(255,255,255,.9);--card-hover:rgba(255,255,255,1);
  --shadow:0 4px 12px rgba(0,0,0,.08);
  --sidebar-bg:#fff;--sidebar-active:rgba(0,136,204,.12);
  color:#1e293b;
}

body{
  font-family:'Noto Sans SC',-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--bg);color:var(--w);overflow:hidden;height:100vh;
}

/* ===== LOGIN PAGE ===== */
#login-page{
  display:flex;align-items:center;justify-content:center;
  height:100vh;width:100vw;
  background:var(--bg);
  position:relative;overflow:hidden;
}
#login-page::before{
  content:'';position:absolute;width:600px;height:600px;
  background:radial-gradient(circle,rgba(0,245,255,.08),transparent 70%);
  top:-100px;right:-100px;border-radius:50%;
}
#login-page::after{
  content:'';position:absolute;width:400px;height:400px;
  background:radial-gradient(circle,rgba(139,92,246,.06),transparent 70%);
  bottom:-50px;left:-50px;border-radius:50%;
}
.login-box{
  position:relative;z-index:1;
  background:var(--bg3);border:1px solid var(--bd);border-radius:16px;
  padding:40px;width:400px;max-width:90vw;
  box-shadow:0 8px 32px rgba(0,0,0,.4);
}
.login-logo{
  text-align:center;margin-bottom:32px;
}
.login-logo h1{
  font-size:28px;font-weight:900;
  background:linear-gradient(135deg,var(--p),var(--p2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.login-logo p{color:var(--nd);font-size:13px;margin-top:6px;}
.login-field{margin-bottom:18px;position:relative;}
.login-field label{display:block;font-size:13px;color:var(--nd);margin-bottom:6px;font-weight:500;}
.login-field input{
  width:100%;padding:12px 16px;background:var(--bg2);border:1px solid var(--bd);
  border-radius:8px;color:var(--w);font-size:14px;outline:none;transition:.2s;
}
.login-field input:focus{border-color:var(--p);box-shadow:0 0 0 3px var(--ps);}
.login-pwd-toggle{
  position:absolute;right:12px;top:32px;cursor:pointer;color:var(--nd);
  padding:4px;
}
.login-pwd-toggle:hover{color:var(--p);}
.login-btn{
  width:100%;padding:14px;border:none;border-radius:8px;
  background:linear-gradient(135deg,var(--p),var(--p2));
  color:#fff;font-size:15px;font-weight:700;cursor:pointer;
  transition:.3s;letter-spacing:1px;margin-top:8px;
}
.login-btn:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,245,255,.3);}
.login-footer{text-align:center;margin-top:20px;color:var(--nd);font-size:12px;}

/* ===== MAIN APP ===== */
#main-app{
  display:none;height:100vh;width:100vw;
}

/* ===== SIDEBAR ===== */
#sidebar{
  width:var(--sidebar-w);height:100vh;
  background:var(--sidebar-bg);
  border-right:1px solid var(--bd);
  display:flex;flex-direction:column;
  transition:width .3s ease;
  overflow:hidden;flex-shrink:0;
  position:relative;z-index:100;
}
#sidebar.collapsed{width:64px;}
#sidebar.collapsed .sb-brand span,
#sidebar.collapsed .sb-group,
#sidebar.collapsed .sb-item span{display:none;}
#sidebar.collapsed .sb-item{justify-content:center;padding:12px 0;}
#sidebar.collapsed .sb-item i{margin:0;font-size:18px;}

.sb-brand{
  padding:16px;border-bottom:1px solid var(--bd);
  display:flex;align-items:center;gap:10px;
  min-height:var(--topbar-h);
}
.sb-brand-icon{
  width:32px;height:32px;border-radius:8px;
  background:linear-gradient(135deg,var(--p),var(--p2));
  display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:14px;color:#fff;flex-shrink:0;
}
.sb-brand span{font-weight:700;font-size:14px;white-space:nowrap;color:var(--w);}
.sb-nav{flex:1;overflow-y:auto;padding:8px 0;}
.sb-nav::-webkit-scrollbar{width:4px;}
.sb-nav::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px;}

.sb-group{
  padding:8px 16px 4px;font-size:11px;color:var(--nd);
  text-transform:uppercase;letter-spacing:1px;font-weight:600;
  margin-top:8px;
}
.sb-group:first-child{margin-top:0;}

.sb-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 16px;margin:2px 8px;border-radius:8px;
  cursor:pointer;transition:.2s;color:var(--nd);font-size:14px;
  white-space:nowrap;
}
.sb-item:hover{background:var(--sidebar-active);color:var(--w);}
.sb-item.active{background:var(--sidebar-active);color:var(--p);font-weight:600;}
.sb-item i{width:18px;text-align:center;font-size:14px;flex-shrink:0;}

/* ===== TOPBAR ===== */
#topbar{
  height:var(--topbar-h);background:var(--bg2);
  border-bottom:1px solid var(--bd);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;
}
.topbar-left{display:flex;align-items:center;gap:12px;}
.topbar-right{display:flex;align-items:center;gap:16px;}
#sidebar-toggle{
  width:32px;height:32px;border-radius:6px;border:1px solid var(--bd);
  background:transparent;color:var(--nd);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:.2s;
}
#sidebar-toggle:hover{color:var(--p);border-color:var(--p);}
#page-title{font-size:16px;font-weight:700;color:var(--w);}
.topbar-btn{
  width:36px;height:36px;border-radius:8px;border:1px solid var(--bd);
  background:transparent;color:var(--nd);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:.2s;font-size:14px;
}
.topbar-btn:hover{color:var(--p);border-color:var(--p);}
#admin-info{font-size:13px;color:var(--w);display:flex;align-items:center;gap:6px;}
#btn-logout{
  padding:6px 12px;border-radius:6px;border:1px solid var(--err);
  background:transparent;color:var(--err);cursor:pointer;
  font-size:12px;transition:.2s;
}
#btn-logout:hover{background:var(--err);color:#fff;}

#mobile-menu{
  display:none;width:36px;height:36px;border-radius:8px;border:1px solid var(--bd);
  background:transparent;color:var(--nd);cursor:pointer;
  align-items:center;justify-content:center;font-size:16px;
}

/* ===== MAIN CONTENT ===== */
#content-area{
  flex:1;display:flex;flex-direction:column;overflow:hidden;
}
#main-content{
  flex:1;overflow-y:auto;padding:20px;
  animation:fadeIn .3s ease;
}
#main-content::-webkit-scrollbar{width:6px;}
#main-content::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px;}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes slideInRight{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:none}}

/* ===== STAT CARDS ===== */
.dash-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:16px;margin-bottom:20px;
}
.stat-card{
  background:var(--bg3);border:1px solid var(--bd);border-radius:12px;
  padding:16px;display:flex;align-items:center;gap:14px;
  transition:.2s;
}
.stat-card:hover{border-color:var(--p);transform:translateY(-2px);box-shadow:var(--shadow);}
.stat-icon{
  width:44px;height:44px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;
}
.stat-value{font-size:22px;font-weight:700;line-height:1.2;}
.stat-label{font-size:12px;color:var(--nd);margin-top:2px;}
.stat-sub{font-size:11px;color:var(--nd);margin-top:2px;}

/* ===== DASH CARD ===== */
.dash-card{
  background:var(--bg3);border:1px solid var(--bd);border-radius:12px;
  margin-bottom:16px;overflow:hidden;
}
.dash-card-header{
  padding:14px 16px;border-bottom:1px solid var(--bd);
  font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px;
}
.dash-row{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:16px;}

/* ===== TABLE ===== */
.admin-table{width:100%;border-collapse:collapse;font-size:13px;}
.admin-table th{
  padding:10px 12px;text-align:left;font-weight:600;
  color:var(--nd);border-bottom:1px solid var(--bd);
  white-space:nowrap;font-size:12px;
}
.admin-table td{
  padding:10px 12px;border-bottom:1px solid var(--bd);
  vertical-align:middle;
}
.admin-table tr:hover td{background:var(--w2);}
.admin-table .action-cell{display:flex;gap:6px;flex-wrap:nowrap;}

/* ===== BUTTONS ===== */
.admin-btn{
  padding:8px 16px;border-radius:6px;border:none;
  background:var(--p);color:#000;font-size:13px;font-weight:600;
  cursor:pointer;transition:.2s;display:inline-flex;align-items:center;gap:6px;
}
.admin-btn:hover{filter:brightness(1.1);transform:translateY(-1px);}
.admin-btn-cancel{
  padding:8px 16px;border-radius:6px;border:1px solid var(--bd);
  background:transparent;color:var(--nd);font-size:13px;
  cursor:pointer;transition:.2s;
}
.admin-btn-cancel:hover{border-color:var(--w);color:var(--w);}
.admin-btn-danger{
  padding:8px 16px;border-radius:6px;border:none;
  background:var(--err);color:#fff;font-size:13px;font-weight:600;
  cursor:pointer;transition:.2s;
}
.admin-btn-danger:hover{filter:brightness(1.1);}

.btn-xs{
  padding:4px 10px;border-radius:4px;border:1px solid var(--bd);
  background:transparent;color:var(--nd);font-size:11px;
  cursor:pointer;transition:.2s;white-space:nowrap;
}
.btn-xs:hover{border-color:var(--p);color:var(--p);}
.btn-xs.btn-ok{border-color:var(--ok);color:var(--ok);}
.btn-xs.btn-ok:hover{background:var(--ok);color:#fff;}
.btn-xs.btn-err{border-color:var(--err);color:var(--err);}
.btn-xs.btn-err:hover{background:var(--err);color:#fff;}
.btn-xs.btn-warn{border-color:var(--warn);color:var(--warn);}
.btn-xs.btn-warn:hover{background:var(--warn);color:#fff;}

/* ===== BADGES ===== */
.badge{
  display:inline-block;padding:2px 8px;border-radius:4px;
  font-size:11px;font-weight:600;white-space:nowrap;
}
.badge-ok{background:rgba(16,185,129,.15);color:var(--ok);}
.badge-err{background:rgba(244,63,94,.15);color:var(--err);}
.badge-warn{background:rgba(245,158,11,.15);color:var(--warn);}
.badge-p{background:var(--ps);color:var(--p);}

/* ===== TOOLBAR ===== */
.page-toolbar{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:16px;flex-wrap:wrap;gap:10px;
}
.toolbar-left{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.toolbar-right{display:flex;align-items:center;gap:10px;}

.page-toolbar input[type="text"],
.page-toolbar select{
  padding:8px 12px;background:var(--bg2);border:1px solid var(--bd);
  border-radius:6px;color:var(--w);font-size:13px;outline:none;
  transition:.2s;
}
.page-toolbar input[type="text"]:focus,
.page-toolbar select:focus{border-color:var(--p);}
.page-toolbar select option{background:var(--bg2);color:var(--w);}

/* ===== TAB BAR ===== */
.tab-bar{
  display:flex;gap:4px;margin-bottom:16px;
  background:var(--bg2);border-radius:8px;padding:4px;
  overflow-x:auto;flex-wrap:nowrap;
}
.tab-item{
  padding:8px 16px;border-radius:6px;cursor:pointer;
  font-size:13px;color:var(--nd);transition:.2s;
  white-space:nowrap;font-weight:500;
}
.tab-item:hover{color:var(--w);background:var(--w2);}
.tab-item.active{background:var(--p);color:#000;font-weight:600;}

/* ===== TOGGLE SWITCH ===== */
.toggle-switch{
  display:inline-flex;align-items:center;cursor:pointer;
}
.toggle-switch input{display:none;}
.toggle-slider{
  width:36px;height:20px;background:var(--bd);border-radius:10px;
  position:relative;transition:.3s;
}
.toggle-slider::after{
  content:'';width:16px;height:16px;background:#fff;border-radius:50%;
  position:absolute;top:2px;left:2px;transition:.3s;
}
.toggle-switch input:checked+.toggle-slider{background:var(--p);}
.toggle-switch input:checked+.toggle-slider::after{left:18px;}

/* ===== FORM ===== */
.form-group{margin-bottom:14px;}
.form-group label{
  display:block;font-size:12px;color:var(--nd);margin-bottom:4px;font-weight:500;
}
.form-group input,.form-group textarea,.form-group select{
  padding:10px 12px;background:var(--bg2);border:1px solid var(--bd);
  border-radius:6px;color:var(--w);font-size:13px;outline:none;
  transition:.2s;font-family:inherit;
}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{
  border-color:var(--p);box-shadow:0 0 0 3px var(--ps);
}

/* ===== PAGINATION ===== */
.pagination{display:flex;justify-content:center;gap:6px;margin-top:16px;}
.pagination button{
  padding:6px 12px;border:1px solid var(--bd);border-radius:4px;
  background:transparent;color:var(--nd);cursor:pointer;font-size:12px;
}
.pagination button:hover,.pagination button.active{background:var(--p);color:#000;border-color:var(--p);}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
  #sidebar{
    position:fixed;left:-260px;top:0;z-index:1000;
    transition:left .3s ease;
  }
  #sidebar.mobile-open{left:0;}
  #mobile-menu{display:flex !important;}
  .dash-grid{grid-template-columns:1fr 1fr;}
  .dash-row{flex-direction:column;}
  .admin-table{font-size:11px;}
  .admin-table th,.admin-table td{padding:8px 6px;}
}
@media(max-width:480px){
  .dash-grid{grid-template-columns:1fr;}
  .login-box{padding:24px;}
  .stat-card{padding:12px;}
  .stat-value{font-size:18px;}
}

/* ===== ANIMATIONS ===== */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes glow{0%,100%{box-shadow:0 0 5px var(--p)}50%{box-shadow:0 0 20px var(--p)}}
</style>
</head>
<body>

<!-- ===== LOGIN PAGE ===== -->
<div id="login-page">
  <div class="login-box">
    <div class="login-logo">
      <h1>罗圣纪元</h1>
      <p>后台管理系统 V6.0</p>
    </div>
    <form id="login-form" autocomplete="off">
      <div class="login-field">
        <label>用户名</label>
        <input type="text" id="login-username" placeholder="请输入管理员账号" autocomplete="off" required>
      </div>
      <div class="login-field">
        <label>密码</label>
        <input type="password" id="login-password" placeholder="请输入密码" autocomplete="off" required>
        <span class="login-pwd-toggle" id="toggle-pwd"><i class="fa-solid fa-eye"></i></span>
      </div>
      <button type="submit" class="login-btn">登 录</button>
    </form>
    <div class="login-footer">
      &copy; 2026 祁阳市罗圣纪元互联网科技有限责任公司
    </div>
  </div>
</div>

<!-- ===== MAIN APP ===== -->
<div id="main-app" style="display:flex;">

  <!-- SIDEBAR -->
  <aside id="sidebar">
    <div class="sb-brand">
      <div class="sb-brand-icon">LS</div>
      <span>罗圣纪元后台</span>
    </div>
    <nav class="sb-nav">
      <div class="sb-group">概览</div>
      <div class="sb-item active" data-page="dashboard" onclick="navigate('dashboard')">
        <i class="fa-solid fa-chart-pie"></i><span>数据看板</span>
      </div>

      <div class="sb-group">管理</div>
      <div class="sb-item" data-page="users" onclick="navigate('users')">
        <i class="fa-solid fa-users"></i><span>用户管理</span>
      </div>
      <div class="sb-item" data-page="tools" onclick="navigate('tools')">
        <i class="fa-solid fa-wand-magic-sparkles"></i><span>AI工具管理</span>
      </div>
      <div class="sb-item" data-page="finance" onclick="navigate('finance')">
        <i class="fa-solid fa-coins"></i><span>财务管理</span>
      </div>
      <div class="sb-item" data-page="content" onclick="navigate('content')">
        <i class="fa-solid fa-newspaper"></i><span>内容管理</span>
      </div>

      <div class="sb-group">系统</div>
      <div class="sb-item" data-page="permissions" onclick="navigate('permissions')">
        <i class="fa-solid fa-user-shield"></i><span>权限管理</span>
      </div>
      <div class="sb-item" data-page="settings" onclick="navigate('settings')">
        <i class="fa-solid fa-gear"></i><span>系统设置</span>
      </div>
    </nav>
  </aside>

  <!-- CONTENT AREA -->
  <div id="content-area" style="flex:1;display:flex;flex-direction:column;overflow:hidden;">
    <!-- TOPBAR -->
    <header id="topbar">
      <div class="topbar-left">
        <button id="mobile-menu"><i class="fa-solid fa-bars"></i></button>
        <button id="sidebar-toggle"><i class="fa-solid fa-angles-left"></i></button>
        <span id="page-title">数据看板</span>
      </div>
      <div class="topbar-right">
        <span id="admin-info"></span>
        <button class="topbar-btn" onclick="AdminAPI.setTheme(document.body.classList.contains('theme-light')?'dark':'light')" title="切换主题"><i class="fa-solid fa-circle-half-stroke"></i></button>
        <button id="btn-logout"><i class="fa-solid fa-right-from-bracket"></i> 退出</button>
      </div>
    </header>

    <!-- MAIN CONTENT -->
    <main id="main-content">
      <!-- 动态渲染 -->
    </main>
  </div>
</div>

<script src="admin-app.js?v=7.0"></script>
</body>
</html>
