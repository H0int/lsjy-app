name: CI

on:
  push:
    paths:
      - 'src/**'
      - 'package.json'
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Lint
        run: npm run lint:check
        continue-on-error: true

      - name: Test
        run: npm test
        continue-on-error: true
