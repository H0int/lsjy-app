name: Deploy

on:
  # 仅允许手动触发，防止未经审批的 push 直通生产部署
  # 如需恢复自动部署，请先为 main 分支配置保护规则（要求 PR 审批）
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if full build needed
        id: check
        run: |
          # 检查是否只有admin文件变更（不需要npm构建）
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "full")
          if echo "$CHANGED" | grep -qvE '^admin/'; then
            echo "need_build=true" >> $GITHUB_OUTPUT
          else
            echo "need_build=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        if: steps.check.outputs.need_build == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        if: steps.check.outputs.need_build == 'true'
        run: npm install --legacy-peer-deps

      - name: Build (skip type check)
        if: steps.check.outputs.need_build == 'true'
        env:
          GITHUB_PAGES: 'true'
          VITE_API_BASE_URL: 'https://api.lsjyapp.cn/api/v1'
          VITE_APP_TITLE: '罗圣纪元 SaaS平台'
          VITE_MOCK: 'false'
        run: npx vite build

      - name: Create SPA 404.html
        if: steps.check.outputs.need_build == 'true'
        run: cp dist/index.html dist/404.html

      - name: Deploy admin-only (no build needed)
        if: steps.check.outputs.need_build == 'false'
        run: |
          # 仅更新admin静态文件到docs/
          mkdir -p docs/admin
          cp admin/index.html docs/admin/
          cp admin/admin-app.js docs/admin/
          cp admin/logo.png docs/admin/ 2>/dev/null || true
          echo "Admin-only deploy: updated docs/admin/"

      - name: Copy admin panel to dist
        if: steps.check.outputs.need_build == 'true'
        run: |
          mkdir -p dist/admin
          cp admin/index.html dist/admin/
          cp admin/admin-app.js dist/admin/
          cp admin/logo.png dist/admin/ 2>/dev/null || true
          cp -r public/payment dist/ 2>/dev/null || true
          cp -r public/qr dist/ 2>/dev/null || true
          cp -r public/qrcodes dist/ 2>/dev/null || true
          cp public/company-logo.jpg dist/ 2>/dev/null || true
          cp public/logo.png dist/ 2>/dev/null || true
          cp public/*.html dist/ 2>/dev/null || true

      - name: Deploy to docs/ directory
        if: steps.check.outputs.need_build == 'true'
        run: |
          # 保留验证文件（微信等平台验证）
          mkdir -p /tmp/verify-backup
          cp -f docs/fdebb311a279685bb5c8d700acae8633.txt /tmp/verify-backup/ 2>/dev/null || true
          rm -rf docs/*
          cp -r dist/* docs/
          echo "lsjyapp.cn" > docs/CNAME
          touch docs/.nojekyll
          # 恢复验证文件
          cp -f /tmp/verify-backup/* docs/ 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "auto-deploy: update docs/ with latest build [skip ci]"
          git push

      - name: Commit admin-only changes
        if: steps.check.outputs.need_build == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/admin/
          git diff --staged --quiet || git commit -m "auto-deploy: update admin panel [skip ci]"
          git push
