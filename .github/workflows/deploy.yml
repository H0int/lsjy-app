name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'admin/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: frontend
        run: npm install --legacy-peer-deps

      - name: Build (skip type check)
        working-directory: frontend
        env:
          GITHUB_PAGES: 'true'
          VITE_API_BASE_URL: 'https://api.lsjyapp.cn/api/v1'
          VITE_APP_TITLE: '罗圣纪元 SaaS平台'
          VITE_MOCK: 'false'
        run: npx vite build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Create SPA 404.html
        working-directory: frontend
        run: cp dist/index.html dist/404.html

      - name: Copy admin panel to dist
        run: |
          mkdir -p frontend/dist/admin
          cp admin/index.html frontend/dist/admin/
          cp admin/admin-app.js frontend/dist/admin/
          cp admin/logo.png frontend/dist/admin/

      - name: Create CNAME
        working-directory: frontend
        run: echo "lsjyapp.cn" > dist/CNAME

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # ===== 新增：部署到 ECS 服务器 =====
      - name: Deploy frontend to ECS via SSH
        if: ${{ secrets.ECS_SSH_KEY != '' }}
        uses: easingthemes/ssh-deploy@v5.0.3
        with:
          SSH_PRIVATE_KEY: ${{ secrets.ECS_SSH_KEY }}
          SOURCE: "frontend/dist/"
          REMOTE_HOST: ${{ secrets.ECS_HOST }}
          REMOTE_USER: ${{ secrets.ECS_USER }}
          TARGET: "/usr/share/nginx/html/frontend/"
          ARGS: "-rlgoDzvc -i --delete"

      - name: Deploy admin to ECS via SSH
        if: ${{ secrets.ECS_SSH_KEY != '' }}
        run: |
          # Setup SSH key
          mkdir -p ~/.ssh
          echo "${{ secrets.ECS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.ECS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

          # Copy admin files
          scp -i ~/.ssh/deploy_key admin/index.html admin/admin-app.js admin/logo.png \
            ${{ secrets.ECS_USER }}@${{ secrets.ECS_HOST }}:/usr/share/nginx/html/admin/

          # Reload nginx
          ssh -i ~/.ssh/deploy_key ${{ secrets.ECS_USER }}@${{ secrets.ECS_HOST }} \
            "sudo nginx -t && sudo systemctl reload nginx"

          echo "✅ ECS deployment completed"
