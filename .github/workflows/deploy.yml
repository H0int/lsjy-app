name: Deploy

on:
  # push:  # 临时禁用，用手动部署
  #   branches: [main]
  #   paths:
  #     - 'src/**'
  #     - 'admin/**'
  #     - 'index.html'
  #     - 'package.json'
  #     - 'vite.config.ts'
  #     - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          rm -rf node_modules
          npm ci --legacy-peer-deps

      - name: Build (skip type check)
        env:
          GITHUB_PAGES: 'true'
          VITE_API_BASE_URL: 'https://api.lsjyapp.cn/api/v1'
          VITE_APP_TITLE: '罗圣纪元 SaaS平台'
          VITE_MOCK: 'false'
        run: npx vite build

      - name: Create SPA 404.html
        run: cp dist/index.html dist/404.html

      - name: Copy admin panel to dist
        run: |
          mkdir -p dist/admin
          cp admin/index.html dist/admin/
          cp admin/admin-app.js dist/admin/
          cp admin/logo.png dist/admin/ 2>/dev/null || true
          cp -r public/payment dist/ 2>/dev/null || true
          cp -r public/qr dist/ 2>/dev/null || true
          cp -r public/qrcodes dist/ 2>/dev/null || true
          cp public/company-logo.jpg dist/ 2>/dev/null || true
          cp public/logo.png dist/ 2>/dev/null || true
          cp public/*.html dist/ 2>/dev/null || true

      - name: Deploy to docs/ directory
        run: |
          # 保留验证文件（微信等平台验证）
          mkdir -p /tmp/verify-backup
          cp -f docs/fdebb311a279685bb5c8d700acae8633.txt /tmp/verify-backup/ 2>/dev/null || true
          rm -rf docs/*
          cp -r dist/* docs/
          echo "lsjyapp.cn" > docs/CNAME
          touch docs/.nojekyll
          # 恢复验证文件
          cp -f /tmp/verify-backup/* docs/ 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "auto-deploy: update docs/ with latest build [skip ci]"
          git push
