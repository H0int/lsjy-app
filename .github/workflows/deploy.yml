name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'admin/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: frontend
        run: npm install --legacy-peer-deps

      - name: Build (skip type check)
        working-directory: frontend
        env:
          GITHUB_PAGES: 'true'
          VITE_API_BASE_URL: 'https://api.lsjyapp.cn/api/v1'
          VITE_APP_TITLE: '罗圣纪元 SaaS平台'
          VITE_MOCK: 'false'
        run: npx vite build

      - name: Create SPA 404.html
        working-directory: frontend
        run: cp dist/index.html dist/404.html

      - name: Copy admin panel to dist
        run: |
          mkdir -p frontend/dist/admin
          cp admin/index.html frontend/dist/admin/
          cp admin/admin-app.js frontend/dist/admin/
          cp admin/logo.png frontend/dist/admin/ 2>/dev/null || true

      - name: Deploy to docs/ directory
        run: |
          # 清理旧的 docs/ 目录
          rm -rf docs/*
          
          # 复制构建产物到 docs/
          cp -r frontend/dist/* docs/
          touch docs/.nojekyll
          
          # 提交到 main 分支
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "auto-deploy: update docs/ with latest build [skip ci]"
          git push
