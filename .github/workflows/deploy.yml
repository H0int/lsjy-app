name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'admin/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: frontend
        run: npm install --legacy-peer-deps

      - name: Build (skip type check)
        working-directory: frontend
        env:
          GITHUB_PAGES: 'true'
          VITE_API_BASE_URL: 'http://8.154.16.5:3000/api/v1'
          VITE_APP_TITLE: '罗圣纪元 SaaS平台'
          VITE_MOCK: 'false'
        run: npx vite build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Create SPA 404.html
        working-directory: frontend
        run: cp dist/index.html dist/404.html

      - name: Copy admin panel to dist
        run: |
          mkdir -p frontend/dist/admin
          cp admin/index.html frontend/dist/admin/
          cp admin/admin-app.js frontend/dist/admin/
          cp admin/logo.png frontend/dist/admin/

      - name: Create CNAME
        working-directory: frontend
        run: echo "lsjyapp.cn" > dist/CNAME

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
