name: Deploy Backend ECS

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'deploy/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Deploy to ECS
        run: |
          # 打包NestJS编译产物(main.js含CORS修复)和Nginx配置
          tar -czf /tmp/lsjy-cors-fix.tar.gz \
            deploy/ecs-live-config/backend-nestjs/main.js \
            deploy/ecs-live-config/nginx-lsjy-live.conf

          scp -o StrictHostKeyChecking=no -o ConnectTimeout=20 /tmp/lsjy-cors-fix.tar.gz root@47.97.166.219:/tmp/lsjy-cors-fix.tar.gz

          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=20 root@47.97.166.219 <<'EOF'
            set -x
            echo "=== 罗圣纪元 CORS 修复部署 ==="

            # 1. 从pm2查找实际运行的后端路径
            echo "=== 查找运行中的后端进程 ==="
            pm2 list
            PM2_STATUS=$(pm2 jlist 2>/dev/null || echo "[]")
            BACKEND_MAIN=$(echo "$PM2_STATUS" | grep -oP '"script":"\K[^"]+main\.js' | grep -v backup | grep -v node_modules | head -1)

            # 如果pm2找不到，手动找（排除backup和node_modules）
            if [ -z "$BACKEND_MAIN" ]; then
              BACKEND_MAIN=$(find /opt/lsjy-app -name "main.js" -path "*/dist/main.js" ! -path "*/node_modules/*" ! -path "*backup*" 2>/dev/null | head -1)
            fi

            # 最终默认路径
            if [ -z "$BACKEND_MAIN" ]; then
              BACKEND_MAIN="/opt/lsjy-app/backend/dist/main.js"
            fi

            # 确保目录存在
            BACKEND_DIR=$(dirname "$BACKEND_MAIN")
            mkdir -p "$BACKEND_DIR"
            echo "使用后端路径: $BACKEND_MAIN"

            # 2. Nginx配置 - 正确找到lsjy.conf
            NGINX_CONF=""
            if [ -f "/etc/nginx/conf.d/lsjy.conf" ]; then
              NGINX_CONF="/etc/nginx/conf.d/lsjy.conf"
            elif [ -f "/etc/nginx/conf.d/lsjyapp.conf" ]; then
              NGINX_CONF="/etc/nginx/conf.d/lsjyapp.conf"
            else
              NGINX_CONF=$(ls /etc/nginx/conf.d/*.conf 2>/dev/null | grep -v default | head -1)
            fi
            echo "使用Nginx配置: $NGINX_CONF"

            # 3. 备份当前配置
            BACKUP_DIR="/opt/lsjy-app/backup-cors-$(date +%Y%m%d%H%M%S)"
            mkdir -p "$BACKUP_DIR"
            [ -f "$BACKEND_MAIN" ] && cp "$BACKEND_MAIN" "$BACKUP_DIR/main.js.bak"
            [ -f "$NGINX_CONF" ] && cp "$NGINX_CONF" "$BACKUP_DIR/nginx-lsjy.conf.bak"
            echo "备份已保存到: $BACKUP_DIR"

            # 4. 解压部署文件
            cd /tmp
            tar -xzf lsjy-cors-fix.tar.gz

            # 5. 更新后端main.js（含CORS修复）
            echo "更新后端 main.js -> $BACKEND_MAIN ..."
            cp /tmp/deploy/ecs-live-config/backend-nestjs/main.js "$BACKEND_MAIN"
            echo "后端文件更新完成，大小: $(wc -c < "$BACKEND_MAIN") bytes"

            # 6. 更新Nginx配置
            if [ -n "$NGINX_CONF" ] && [ -f "$NGINX_CONF" ]; then
              echo "更新 Nginx 配置 -> $NGINX_CONF ..."

              # 移除新配置中的default_server标记，避免与default.conf冲突
              sed -i 's/default_server//g' /tmp/deploy/ecs-live-config/nginx-lsjy-live.conf

              cp /tmp/deploy/ecs-live-config/nginx-lsjy-live.conf "$NGINX_CONF"

              # 验证Nginx配置
              echo "验证 Nginx 配置..."
              nginx -t 2>&1
              NGINX_OK=$?

              if [ $NGINX_OK -eq 0 ]; then
                echo "重启 Nginx..."
                nginx -s reload
              else
                echo "Nginx配置验证失败，恢复备份..."
                cp "$BACKUP_DIR/nginx-lsjy.conf.bak" "$NGINX_CONF"
                nginx -t
              fi
            else
              echo "WARNING: 未找到正确的Nginx配置"
              ls -la /etc/nginx/conf.d/
            fi

            # 7. 重启NestJS后端
            echo "重启 NestJS 后端..."
            pm2 restart lsjy-backend 2>/dev/null || pm2 restart all 2>/dev/null || {
              echo "pm2 restart失败，尝试start..."
              pm2 start "$BACKEND_MAIN" --name lsjy-backend --node-args="--max-old-space-size=512" 2>/dev/null || true
            }
            pm2 save 2>/dev/null || true

            sleep 8

            # 8. 验证
            echo ""
            echo "=== 验证部署 ==="

            # 检查pm2状态
            pm2 list

            # 检查后端健康
            for i in 1 2 3 4 5 6; do
              HEALTH=$(curl -s http://localhost:3000/api/v1/auth/login -X POST -H "Content-Type: application/json" -d '{}' 2>/dev/null | head -c 200)
              if [ -n "$HEALTH" ]; then
                echo "后端响应正常"
                break
              fi
              echo "等待后端启动... ($i/6)"
              sleep 5
            done

            # 验证CORS头 - 直接访问后端端口绕过Nginx
            echo ""
            echo "验证后端CORS（直连3000端口）..."
            curl -sI -X OPTIONS http://localhost:3000/api/v1/auth/login \
              -H "Origin: https://lsjyapp.cn" \
              -H "Access-Control-Request-Method: POST" \
              -H "Access-Control-Request-Headers: Content-Type" 2>/dev/null | grep -i "access-control" || echo "直连后端也无CORS头"

            # 验证通过Nginx的CORS
            echo ""
            echo "验证通过Nginx的CORS头..."
            curl -sI -X OPTIONS https://api.lsjyapp.cn/api/v1/auth/login \
              -H "Origin: https://lsjyapp.cn" \
              -H "Access-Control-Request-Method: POST" \
              -H "Access-Control-Request-Headers: Content-Type" 2>/dev/null | grep -i "access-control\|HTTP/" || echo "无CORS头"

            echo ""
            echo "=== 部署完成 ==="
          EOF
