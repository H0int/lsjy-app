name: Deploy Backend ECS

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'deploy/**'
      - 'docs/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Build Backend
        run: |
          cd backend
          npm ci
          npx nest build
          echo "✅ NestJS build complete, dist size:"
          du -sh dist/

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Deploy to ECS
        run: |
          # 打包需要部署的文件: NestJS dist目录 + Express server.js + Nginx配置
          tar -czf /tmp/lsjy-cors-fix.tar.gz \
            backend/dist \
            deploy/ecs-live-config/nginx-lsjy-live.conf \
            deploy/skill-services/docker-compose.yml \
            deploy/skill-services/deploy-skill-services.sh \
            backend/server.js \
            backend/express-package.json \
            docs

          scp -o StrictHostKeyChecking=no -o ConnectTimeout=20 /tmp/lsjy-cors-fix.tar.gz root@47.97.166.219:/tmp/lsjy-cors-fix.tar.gz

          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=20 root@47.97.166.219 <<'EOF'
            set -x
            echo "=== 罗圣纪元 全量更新部署 ==="

            # 查找实际的后端路径（NestJS和Express都要更新）
            echo "=== 查找后端进程 ==="
            pm2 list

            # 查找NestJS main.js路径
            NEST_MAIN=""
            for p in $(find /opt -name "main.js" -path "*/dist/*" ! -path "*/node_modules/*" ! -path "*backup*" 2>/dev/null); do
              if grep -q "NestFactory" "$p" 2>/dev/null; then
                NEST_MAIN="$p"
                break
              fi
            done

            # 查找Express server.js路径（包含agentsStore的那个）
            EXPRESS_SERVER=""
            for p in /opt/lsjy-app/backend/server.js /opt/lsjy/server.js /root/lsjy/backend/server.js; do
              if [ -f "$p" ] && grep -q "agentsStore" "$p"; then
                EXPRESS_SERVER="$p"
                break
              fi
            done
            if [ -z "$EXPRESS_SERVER" ]; then
              EXPRESS_SERVER=$(find /opt -name "server.js" ! -path "*/node_modules/*" ! -path "*backup*" 2>/dev/null | while read f; do
                if grep -q "agentsStore" "$f" 2>/dev/null; then echo "$f"; break; fi
              done)
            fi
            if [ -z "$EXPRESS_SERVER" ]; then
              EXPRESS_SERVER="/opt/lsjy-app/backend/server.js"
              mkdir -p "$(dirname "$EXPRESS_SERVER")"
            fi

            NEST_DIR=$(dirname "$NEST_MAIN")
            NGINX_CONF=""
            if [ -f "/etc/nginx/conf.d/lsjy.conf" ]; then
              NGINX_CONF="/etc/nginx/conf.d/lsjy.conf"
            else
              NGINX_CONF=$(ls /etc/nginx/conf.d/*.conf 2>/dev/null | grep -v default | head -1)
            fi

            echo "NestJS路径: $NEST_MAIN"
            echo "Express路径: $EXPRESS_SERVER"
            echo "Nginx配置: $NGINX_CONF"

            # 备份
            BACKUP_DIR="/opt/lsjy-app/backup-$(date +%Y%m%d%H%M%S)"
            mkdir -p "$BACKUP_DIR"
            [ -n "$NEST_MAIN" ] && [ -f "$NEST_MAIN" ] && cp "$NEST_MAIN" "$BACKUP_DIR/main.js.bak"
            [ -n "$EXPRESS_SERVER" ] && [ -f "$EXPRESS_SERVER" ] && cp "$EXPRESS_SERVER" "$BACKUP_DIR/server.js.bak"
            [ -n "$NGINX_CONF" ] && [ -f "$NGINX_CONF" ] && cp "$NGINX_CONF" "$BACKUP_DIR/nginx.bak"
            echo "备份到: $BACKUP_DIR"

            # 解压
            cd /tmp
            tar -xzf lsjy-cors-fix.tar.gz

            # 更新NestJS完整dist目录（包含所有编译后的模块）
            if [ -n "$NEST_MAIN" ] && [ -d "/tmp/backend/dist" ]; then
              echo "更新NestJS完整dist目录 -> $NEST_DIR"
              mkdir -p "$NEST_DIR"
              rsync -a --delete /tmp/backend/dist/ "$NEST_DIR/"
            fi

            # 更新Express server.js (包含180个AI员工数据)
            if [ -n "$EXPRESS_SERVER" ] && [ -f "/tmp/backend/server.js" ]; then
              echo "更新Express server.js -> $EXPRESS_SERVER"
              cp /tmp/backend/server.js "$EXPRESS_SERVER"
              cp /tmp/backend/express-package.json "$(dirname "$EXPRESS_SERVER")/package.json"
              cd "$(dirname "$EXPRESS_SERVER")"
              if [ ! -d "node_modules" ]; then
                npm install --omit=dev
              fi
            else
              echo "ERROR: 未找到可部署的Express server.js"
              exit 1
            fi

            # 同步前端静态文件到 ECS Nginx 根目录，兜底绕过 GitHub Pages 发布波动
            if [ -d "/tmp/docs" ]; then
              echo "同步前端静态文件 -> /usr/share/nginx/html"
              mkdir -p /usr/share/nginx/html
              rsync -a --delete /tmp/docs/ /usr/share/nginx/html/
            fi

            # 更新Nginx
            if [ -n "$NGINX_CONF" ] && [ -f "/tmp/deploy/ecs-live-config/nginx-lsjy-live.conf" ]; then
              for conf in /etc/nginx/conf.d/*.conf; do
                if [ "$conf" != "$NGINX_CONF" ] && grep -q "server_name.*api.lsjyapp.cn" "$conf" 2>/dev/null; then
                  echo "禁用重复Nginx配置: $conf"
                  mv "$conf" "$conf.disabled-$(date +%Y%m%d%H%M%S)"
                fi
              done
              sed -i 's/default_server//g' /tmp/deploy/ecs-live-config/nginx-lsjy-live.conf
              cp /tmp/deploy/ecs-live-config/nginx-lsjy-live.conf "$NGINX_CONF"
              nginx -t && nginx -s reload
              echo "Nginx配置已更新"
            fi

            # 部署开源Skill独立服务（当前先启动 Matomo，Docker不存在时安全跳过）
            if [ -f "/tmp/deploy/skill-services/deploy-skill-services.sh" ]; then
              chmod +x /tmp/deploy/skill-services/deploy-skill-services.sh
              bash /tmp/deploy/skill-services/deploy-skill-services.sh || true
            fi

            # 写入后端模型环境变量（密钥来自 GitHub Secrets，不进入前端和源码）
            {
              printf '%s\n' "export SILICONFLOW_API_KEY='${{ secrets.SILICONFLOW_API_KEY }}'"
              printf '%s\n' "export ARK_API_KEY='${{ secrets.ARK_API_KEY }}'"
              printf '%s\n' "export BAILIAN_API_KEY='${{ secrets.BAILIAN_API_KEY }}'"
              printf '%s\n' "export ZHIPU_API_KEY='${{ secrets.ZHIPU_API_KEY }}'"
              printf '%s\n' "export BAIDU_API_KEY='${{ secrets.BAIDU_API_KEY }}'"
              printf '%s\n' "export HUNYUAN_API_KEY='${{ secrets.HUNYUAN_API_KEY }}'"
              printf '%s\n' "export DOUBAO_API_KEY='${{ secrets.DOUBAO_API_KEY }}'"
              printf '%s\n' "export DEEPSEEK_API_KEY='${{ secrets.DEEPSEEK_API_KEY }}'"
              printf '%s\n' "export TONGYI_API_KEY='${{ secrets.TONGYI_API_KEY }}'"
              printf '%s\n' "export KIMI_API_KEY='${{ secrets.KIMI_API_KEY }}'"
              printf '%s\n' "export JIMENG_API_KEY='${{ secrets.JIMENG_API_KEY }}'"
              printf '%s\n' "export OPENAI_API_KEY='${{ secrets.OPENAI_API_KEY }}'"
              printf '%s\n' "export VOLCENGINE_API_KEY='${{ secrets.VOLCENGINE_API_KEY }}'"
              printf '%s\n' "export MODELSCOPE_API_KEY='${{ secrets.MODELSCOPE_API_KEY }}'"
              printf '%s\n' "export LONGXIA_API_KEY='${{ secrets.LONGXIA_API_KEY }}'"
              printf '%s\n' "export YUANBAO_API_KEY='${{ secrets.YUANBAO_API_KEY }}'"
            } > /etc/profile.d/lsjy-ai-models.sh
            chmod 600 /etc/profile.d/lsjy-ai-models.sh
            set -a
            . /etc/profile.d/lsjy-ai-models.sh
            set +a

            # 重启NestJS后端（主服务，端口3000）
            if [ -n "$NEST_MAIN" ] && [ -f "$NEST_MAIN" ]; then
              echo "重启NestJS后端: $NEST_MAIN"
              pm2 restart lsjy-backend --update-env || true
              sleep 5
            fi

            # 重启Express后端（备用服务，需使用不同端口避免冲突）
            pm2 delete lsjy-express >/dev/null 2>&1 || true
            # Express使用3001端口避免与NestJS 3000冲突
            pm2 start "$EXPRESS_SERVER" --name lsjy-express --update-env -- --port=3001 || true
            pm2 save || true
            sleep 8

            # 验证
            echo ""
            echo "=== 验证 ==="
            pm2 list

            # 验证API返回的agents数量
            AGENTS_COUNT=$(curl -s http://localhost:3000/api/v1/agents 2>/dev/null | grep -oP '"id":\d+' | wc -l)
            TOOLS_COUNT=$(curl -s http://localhost:3000/api/v1/ai/tools 2>/dev/null | grep -oP '"id":\d+' | wc -l)
            echo ""
            echo "Agents数量(从API): $AGENTS_COUNT"
            echo "Tools数量(从API): $TOOLS_COUNT"

            # 验证NestJS主服务是否正常（agents由NestJS提供）
            HEALTH=$(curl -s --max-time 10 http://localhost:3000/api/v1/health 2>/dev/null)
            echo "Health check: $HEALTH"
            if [ -z "$HEALTH" ]; then
              echo "ERROR: NestJS健康检查失败，服务未响应"
              pm2 logs lsjy-backend --lines 50 --nostream || true
              exit 1
            fi
            echo ""
            echo "注意: Express运行在3001端口，NestJS运行在3000端口"
            echo "如需验证充值接口: curl -X POST http://localhost:3000/api/v1/payment/admin/coins/set-balance ..."

            if echo "$AGENTS_COUNT" | grep -q "1[89][0-9]"; then
              echo "✅ 180个AI员工部署成功!"
            else
              echo "⚠️ Agents数量异常，检查pm2日志..."
              pm2 logs lsjy-express --lines 80 --nostream || true
              exit 1
            fi

            if [ "$TOOLS_COUNT" -lt 1 ]; then
              echo "⚠️ Tools数量异常，检查pm2日志..."
              pm2 logs lsjy-express --lines 80 --nostream || true
              exit 1
            fi

            echo ""
            echo "=== 部署完成 ==="
          EOF
