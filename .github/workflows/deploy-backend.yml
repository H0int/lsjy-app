name: Deploy Backend ECS

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'deploy/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Deploy to ECS
        run: |
          # 打包需要部署的文件: NestJS main.js + Express server.js + Nginx配置
          tar -czf /tmp/lsjy-cors-fix.tar.gz \
            deploy/ecs-live-config/backend-nestjs/main.js \
            deploy/ecs-live-config/nginx-lsjy-live.conf \
            backend/server.js

          scp -o StrictHostKeyChecking=no -o ConnectTimeout=20 /tmp/lsjy-cors-fix.tar.gz root@47.97.166.219:/tmp/lsjy-cors-fix.tar.gz

          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=20 root@47.97.166.219 <<'EOF'
            set -x
            echo "=== 罗圣纪元 全量更新部署 ==="

            # 查找实际的后端路径（NestJS和Express都要更新）
            echo "=== 查找后端进程 ==="
            pm2 list

            # 查找NestJS main.js路径
            NEST_MAIN=""
            for p in $(find /opt -name "main.js" -path "*/dist/*" ! -path "*/node_modules/*" ! -path "*backup*" 2>/dev/null); do
              if grep -q "NestFactory" "$p" 2>/dev/null; then
                NEST_MAIN="$p"
                break
              fi
            done

            # 查找Express server.js路径（包含agentsStore的那个）
            EXPRESS_SERVER=""
            for p in /opt/lsjy-app/backend/server.js /opt/lsjy/server.js /root/lsjy/backend/server.js; do
              if [ -f "$p" ] && grep -q "agentsStore" "$p"; then
                EXPRESS_SERVER="$p"
                break
              fi
            done
            if [ -z "$EXPRESS_SERVER" ]; then
              EXPRESS_SERVER=$(find /opt -name "server.js" ! -path "*/node_modules/*" ! -path "*backup*" 2>/dev/null | while read f; do
                if grep -q "agentsStore" "$f" 2>/dev/null; then echo "$f"; break; fi
              done)
            fi

            NEST_DIR=$(dirname "$NEST_MAIN")
            NGINX_CONF=""
            if [ -f "/etc/nginx/conf.d/lsjy.conf" ]; then
              NGINX_CONF="/etc/nginx/conf.d/lsjy.conf"
            else
              NGINX_CONF=$(ls /etc/nginx/conf.d/*.conf 2>/dev/null | grep -v default | head -1)
            fi

            echo "NestJS路径: $NEST_MAIN"
            echo "Express路径: $EXPRESS_SERVER"
            echo "Nginx配置: $NGINX_CONF"

            # 备份
            BACKUP_DIR="/opt/lsjy-app/backup-$(date +%Y%m%d%H%M%S)"
            mkdir -p "$BACKUP_DIR"
            [ -n "$NEST_MAIN" ] && [ -f "$NEST_MAIN" ] && cp "$NEST_MAIN" "$BACKUP_DIR/main.js.bak"
            [ -n "$EXPRESS_SERVER" ] && [ -f "$EXPRESS_SERVER" ] && cp "$EXPRESS_SERVER" "$BACKUP_DIR/server.js.bak"
            [ -n "$NGINX_CONF" ] && [ -f "$NGINX_CONF" ] && cp "$NGINX_CONF" "$BACKUP_DIR/nginx.bak"
            echo "备份到: $BACKUP_DIR"

            # 解压
            cd /tmp
            tar -xzf lsjy-cors-fix.tar.gz

            # 更新NestJS main.js
            if [ -n "$NEST_MAIN" ] && [ -f "/tmp/deploy/ecs-live-config/backend-nestjs/main.js" ]; then
              echo "更新NestJS main.js -> $NEST_MAIN"
              cp /tmp/deploy/ecs-live-config/backend-nestjs/main.js "$NEST_MAIN"
            fi

            # 更新Express server.js (包含180个AI员工数据)
            if [ -n "$EXPRESS_SERVER" ] && [ -f "/tmp/backend/server.js" ]; then
              echo "更新Express server.js -> $EXPRESS_SERVER"
              cp /tmp/backend/server.js "$EXPRESS_SERVER"
            else
              echo "WARNING: 未找到Express server.js，搜索pm2中运行的服务..."
              pm2 jlist 2>/dev/null | grep -oP '"script":"\K[^"]+server\.js' | head -1
            fi

            # 更新Nginx
            if [ -n "$NGINX_CONF" ] && [ -f "/tmp/deploy/ecs-live-config/nginx-lsjy-live.conf" ]; then
              sed -i 's/default_server//g' /tmp/deploy/ecs-live-config/nginx-lsjy-live.conf
              cp /tmp/deploy/ecs-live-config/nginx-lsjy-live.conf "$NGINX_CONF"
              nginx -t && nginx -s reload
              echo "Nginx配置已更新"
            fi

            # 重启所有pm2进程
            echo "重启后端服务..."
            pm2 restart all 2>/dev/null || pm2 restart lsjy-backend 2>/dev/null || true
            sleep 8

            # 验证
            echo ""
            echo "=== 验证 ==="
            pm2 list

            # 验证API返回的agents数量
            AGENTS_COUNT=$(curl -s http://localhost:3000/api/v1/agents 2>/dev/null | grep -oP '"id":\d+' | wc -l)
            TOOLS_COUNT=$(curl -s http://localhost:3000/api/v1/ai/tools 2>/dev/null | grep -oP '"id":\d+' | wc -l)
            echo ""
            echo "Agents数量(从API): $AGENTS_COUNT"
            echo "Tools数量(从API): $TOOLS_COUNT"

            if echo "$AGENTS_COUNT" | grep -q "1[89][0-9]"; then
              echo "✅ 180个AI员工部署成功!"
            else
              echo "⚠️ Agents数量异常，检查pm2日志..."
            fi

            echo ""
            echo "=== 部署完成 ==="
          EOF
