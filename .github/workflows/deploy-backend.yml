name: Deploy Backend ECS

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'deploy/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Deploy to ECS
        run: |
          # 打包NestJS编译产物(main.js含CORS修复)和Nginx配置
          tar -czf /tmp/lsjy-cors-fix.tar.gz \
            deploy/ecs-live-config/backend-nestjs/main.js \
            deploy/ecs-live-config/nginx-lsjy-live.conf

          scp -o StrictHostKeyChecking=no -o ConnectTimeout=20 /tmp/lsjy-cors-fix.tar.gz root@47.97.166.219:/tmp/lsjy-cors-fix.tar.gz

          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=20 root@47.97.166.219 <<'EOF'
            set -e
            echo "=== 罗圣纪元 CORS 修复部署 ==="

            # 查找实际的后端和Nginx路径
            echo "=== 探查服务器目录结构 ==="
            ls /opt/lsjy-app/ 2>/dev/null || echo "/opt/lsjy-app/ 不存在"
            find /opt -name "main.js" -path "*nestjs*" 2>/dev/null | head -5
            find /opt -name "main.js" -path "*dist*" 2>/dev/null | head -5
            ls /etc/nginx/conf.d/ 2>/dev/null || echo "nginx conf.d 不存在"

            # 确定实际路径
            BACKEND_MAIN=$(find /opt -name "main.js" -path "*dist*" 2>/dev/null | head -1)
            NGINX_CONF=$(ls /etc/nginx/conf.d/*.conf 2>/dev/null | head -1)
            echo "找到后端文件: $BACKEND_MAIN"
            echo "找到Nginx配置: $NGINX_CONF"

            if [ -z "$BACKEND_MAIN" ]; then
              echo "ERROR: 找不到后端main.js！尝试pm2查找..."
              pm2 describe lsjy-backend 2>/dev/null | grep "exec cwd\|script path" || pm2 list
              BACKEND_MAIN="/opt/lsjy-app/backend-nestjs/dist/main.js"
              echo "尝试使用默认路径: $BACKEND_MAIN"
            fi

            # 提取目录
            BACKEND_DIR=$(dirname "$BACKEND_MAIN")
            mkdir -p "$BACKEND_DIR"
            echo "后端目录: $BACKEND_DIR"

            # 备份当前配置
            BACKUP_DIR="/opt/lsjy-app/backup-cors-$(date +%Y%m%d%H%M%S)"
            mkdir -p "$BACKUP_DIR"
            [ -f "$BACKEND_MAIN" ] && cp "$BACKEND_MAIN" "$BACKUP_DIR/main.js.bak"
            [ -f "$NGINX_CONF" ] && cp "$NGINX_CONF" "$BACKUP_DIR/nginx-lsjy.conf.bak"
            echo "备份已保存到: $BACKUP_DIR"

            # 解压部署文件
            cd /tmp
            tar -xzf lsjy-cors-fix.tar.gz

            # 更新NestJS main.js（含CORS修复）
            echo "更新后端 main.js -> $BACKEND_MAIN ..."
            cp /tmp/deploy/ecs-live-config/backend-nestjs/main.js "$BACKEND_MAIN"

            # 更新Nginx配置（移除OPTIONS if块拦截）
            if [ -n "$NGINX_CONF" ]; then
              echo "更新 Nginx 配置 -> $NGINX_CONF ..."
              cp /tmp/deploy/ecs-live-config/nginx-lsjy-live.conf "$NGINX_CONF"

              # 验证Nginx配置
              echo "验证 Nginx 配置..."
              nginx -t

              # 重启Nginx
              echo "重启 Nginx..."
              nginx -s reload
            else
              echo "WARNING: 未找到Nginx配置，跳过Nginx更新"
            fi

            # 重启NestJS后端
            echo "重启 NestJS 后端 (lsjy-backend)..."
            pm2 restart lsjy-backend 2>/dev/null || {
              echo "pm2 restart失败，尝试start..."
              pm2 start "$BACKEND_MAIN" --name lsjy-backend --node-args="--max-old-space-size=512" 2>/dev/null || true
            }
            pm2 save 2>/dev/null || true

            sleep 5

            # 验证后端健康
            echo ""
            echo "=== 验证部署 ==="
            for i in 1 2 3 4 5 6; do
              if curl -fsS http://localhost:3000/api/v1/system/health 2>/dev/null || curl -fsS http://localhost:3000/api/v1/health 2>/dev/null; then
                echo ""
                echo "后端健康检查通过!"
                break
              fi
              echo "等待后端启动... ($i/6)"
              sleep 5
            done

            # 验证CORS
            echo ""
            echo "验证CORS头..."
            CORS_CHECK=$(curl -s -o /dev/null -w "%{http_code}" -X OPTIONS https://api.lsjyapp.cn/api/v1/auth/login \
              -H "Origin: https://lsjyapp.cn" \
              -H "Access-Control-Request-Method: POST" \
              -H "Access-Control-Request-Headers: Content-Type" 2>/dev/null)
            echo "OPTIONS预检响应状态码: $CORS_CHECK"

            CORS_ORIGIN=$(curl -sI -X OPTIONS https://api.lsjyapp.cn/api/v1/auth/login \
              -H "Origin: https://lsjyapp.cn" \
              -H "Access-Control-Request-Method: POST" \
              -H "Access-Control-Request-Headers: Content-Type" 2>/dev/null | grep -i "access-control-allow-origin" || echo "未找到CORS头")
            echo "CORS Allow-Origin: $CORS_ORIGIN"

            echo ""
            echo "=== 部署完成 ==="
          EOF
