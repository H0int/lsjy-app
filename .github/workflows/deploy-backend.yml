name: Deploy Backend ECS

on:
  workflow_dispatch:

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Build Backend
        run: |
          cd backend
          npm ci
          npx nest build
          echo "✅ NestJS build complete, dist size:"
          du -sh dist/

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Clean ECS disk space (fix 100% full blocking scp/deploy)
        run: |
          set +e
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=20 root@47.97.166.219 <<'CLEANEOF'
            echo "=== 部署前磁盘清理(释放空间,确保scp/部署可执行) ==="
            df -h / || true
            rm -rf /tmp/backend /tmp/docs /tmp/deploy /tmp/lsjy-cors-fix.tar.gz || true
            ls -dt /opt/lsjy-app/backup-* 2>/dev/null | tail -n +3 | xargs -r rm -rf || true
            pm2 flush >/dev/null 2>&1 || true
            find /root/.pm2/logs -type f -exec rm -f {} \; 2>/dev/null || true
            find /var/log -type f \( -name "*.gz" -o -name "*.log.*" -o -name "*.[0-9]" \) -exec rm -f {} \; 2>/dev/null || true
            journalctl --vacuum-size=50M >/dev/null 2>&1 || true
            # 激进清理Docker(未使用的镜像/容器/网络/构建缓存——/var/lib/docker曾占17G是磁盘满主因)
            docker system prune -af >/dev/null 2>&1 || true
            docker builder prune -af >/dev/null 2>&1 || true
            echo "--- 清理后磁盘状态 ---"
            df -h / || true
          CLEANEOF

      - name: Deploy to ECS
        run: |
          # 打包需要部署的文件: NestJS dist目录 + Express server.js + Nginx配置
          tar -czf /tmp/lsjy-cors-fix.tar.gz \
            backend/dist \
            deploy/ecs-live-config/nginx-lsjy-live.conf \
            deploy/skill-services/docker-compose.yml \
            deploy/skill-services/deploy-skill-services.sh \
            backend/server.js \
            backend/express-package.json \
            backend/package.json \
            backend/package-lock.json \
            docs

          scp -o StrictHostKeyChecking=no -o ConnectTimeout=20 /tmp/lsjy-cors-fix.tar.gz root@47.97.166.219:/tmp/lsjy-cors-fix.tar.gz

          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=20 root@47.97.166.219 <<'EOF'
            set -x
            echo "=== 罗圣纪元 全量更新部署 ==="

            # ===== 部署前磁盘清理(曾因磁盘100%满导致部署失败/服务502) =====
            echo "=== 磁盘清理: 释放空间 ==="
            df -h / || true
            echo "--- 磁盘占用诊断(TOP目录) ---"
            du -sh /root/.pm2/logs /opt/lsjy-app /tmp /var/lib/docker /var/log /usr/share/nginx/html 2>/dev/null || true
            # 清理上次部署在/tmp的解压残留(保留本次刚scp上传的tar包)
            rm -rf /tmp/backend /tmp/docs /tmp/deploy
            # 仅保留最近2个备份目录
            ls -dt /opt/lsjy-app/backup-* 2>/dev/null | tail -n +3 | xargs -r rm -rf
            # 清空pm2日志(最常见的磁盘杀手)
            pm2 flush >/dev/null 2>&1 || true
            find /root/.pm2/logs -type f -exec rm -f {} \; 2>/dev/null || true
            # 删除已轮转的旧系统日志
            find /var/log -type f \( -name "*.gz" -o -name "*.log.*" -o -name "*.[0-9]" \) -exec rm -f {} \; 2>/dev/null || true
            # 收缩systemd journal
            journalctl --vacuum-size=50M >/dev/null 2>&1 || true
            # Docker悬空镜像/构建缓存清理(安全,不影响运行中的容器)
            docker image prune -f >/dev/null 2>&1 || true
            docker builder prune -f >/dev/null 2>&1 || true
            echo "--- 清理后磁盘状态 ---"
            df -h / || true

            # 查找实际的后端路径（NestJS和Express都要更新）
            echo "=== 查找后端进程 ==="
            pm2 list

            # 查找NestJS main.js路径
            NEST_MAIN=""
            for p in $(find /opt -name "main.js" -path "*/dist/*" ! -path "*/node_modules/*" ! -path "*backup*" 2>/dev/null); do
              if grep -q "NestFactory" "$p" 2>/dev/null; then
                NEST_MAIN="$p"
                break
              fi
            done

            # 查找Express server.js路径（包含agentsStore的那个）
            EXPRESS_SERVER=""
            for p in /opt/lsjy-app/backend/server.js /opt/lsjy/server.js /root/lsjy/backend/server.js; do
              if [ -f "$p" ] && grep -q "agentsStore" "$p"; then
                EXPRESS_SERVER="$p"
                break
              fi
            done
            if [ -z "$EXPRESS_SERVER" ]; then
              EXPRESS_SERVER=$(find /opt -name "server.js" ! -path "*/node_modules/*" ! -path "*backup*" 2>/dev/null | while read f; do
                if grep -q "agentsStore" "$f" 2>/dev/null; then echo "$f"; break; fi
              done)
            fi
            if [ -z "$EXPRESS_SERVER" ]; then
              EXPRESS_SERVER="/opt/lsjy-app/backend/server.js"
              mkdir -p "$(dirname "$EXPRESS_SERVER")"
            fi

            NEST_DIR=$(dirname "$NEST_MAIN")
            NGINX_CONF=""
            if [ -f "/etc/nginx/conf.d/lsjy.conf" ]; then
              NGINX_CONF="/etc/nginx/conf.d/lsjy.conf"
            else
              NGINX_CONF=$(ls /etc/nginx/conf.d/*.conf 2>/dev/null | grep -v default | head -1)
            fi

            echo "NestJS路径: $NEST_MAIN"
            echo "Express路径: $EXPRESS_SERVER"
            echo "Nginx配置: $NGINX_CONF"

            # 备份
            BACKUP_DIR="/opt/lsjy-app/backup-$(date +%Y%m%d%H%M%S)"
            mkdir -p "$BACKUP_DIR"
            [ -n "$NEST_MAIN" ] && [ -f "$NEST_MAIN" ] && cp "$NEST_MAIN" "$BACKUP_DIR/main.js.bak"
            [ -n "$EXPRESS_SERVER" ] && [ -f "$EXPRESS_SERVER" ] && cp "$EXPRESS_SERVER" "$BACKUP_DIR/server.js.bak"
            [ -n "$NGINX_CONF" ] && [ -f "$NGINX_CONF" ] && cp "$NGINX_CONF" "$BACKUP_DIR/nginx.bak"
            echo "备份到: $BACKUP_DIR"

            # 解压
            cd /tmp
            tar -xzf lsjy-cors-fix.tar.gz

            # 更新NestJS完整dist目录（包含所有编译后的模块）
            if [ -n "$NEST_MAIN" ] && [ -d "/tmp/backend/dist" ]; then
              echo "更新NestJS完整dist目录 -> $NEST_DIR"
              mkdir -p "$NEST_DIR"
              rsync -a --delete /tmp/backend/dist/ "$NEST_DIR/"
            fi

            # ===== 安装NestJS生产依赖(修复 Cannot find module '@nestjs/core' / 502根因) =====
            NEST_BACKEND_DIR=$(dirname "$NEST_MAIN")   # /opt/lsjy-app/backend (dist的父目录)
            if [ -f "/tmp/backend/package.json" ]; then
              NEST_AVAIL_KB=$(df -k / | awk 'NR==2{print $4}')
              echo "NestJS依赖安装前可用磁盘: $((NEST_AVAIL_KB/1024)) MB"
              if [ "${NEST_AVAIL_KB:-0}" -gt 2097152 ]; then
                # 如果@nestjs/core已存在则跳过安装(大幅加速)
                if [ -f "$NEST_BACKEND_DIR/node_modules/@nestjs/core/package.json" ]; then
                  echo "@nestjs/core 已存在,跳过npm install"
                else
                  echo "安装NestJS生产依赖 -> $NEST_BACKEND_DIR"
                  cp /tmp/backend/package.json "$NEST_BACKEND_DIR/package.json"
                  cp /tmp/backend/package-lock.json "$NEST_BACKEND_DIR/package-lock.json"
                  cd "$NEST_BACKEND_DIR"
                  # 中国镜像加速+仅生产依赖
                  npm ci --omit=dev --no-audit --no-fund --registry=https://registry.npmmirror.com 2>&1 | tail -10 || npm install --omit=dev --no-audit --no-fund --registry=https://registry.npmmirror.com --prefer-offline 2>&1 | tail -10 || true
                  echo "--- NestJS依赖安装完成,校验@nestjs/core ---"
                  ls node_modules/@nestjs/core/package.json 2>/dev/null && echo "@nestjs/core OK" || echo "WARN: @nestjs/core 仍缺失"
                fi
              else
                echo "⚠️ 磁盘可用<2G,跳过NestJS依赖安装(可能因缺依赖启动失败,请扩容后重部署)"
              fi
            fi

            # 更新Express server.js (包含180个AI员工数据)
            if [ -n "$EXPRESS_SERVER" ] && [ -f "/tmp/backend/server.js" ]; then
              echo "更新Express server.js -> $EXPRESS_SERVER"
              cp /tmp/backend/server.js "$EXPRESS_SERVER"
              cd "$(dirname "$EXPRESS_SERVER")"
              # Express与NestJS共享本目录node_modules:
              # 直接安装express/cors/dotenv(不修改package.json,不清除已有NestJS依赖)
              npm install express cors dotenv --no-save --no-audit --no-fund --no-package-lock 2>&1 | tail -8 || true
              # 恢复NestJS的package.json/package-lock.json为本目录权威清单
              [ -f "/tmp/backend/package.json" ] && cp /tmp/backend/package.json "$(dirname "$EXPRESS_SERVER")/package.json"
              [ -f "/tmp/backend/package-lock.json" ] && cp /tmp/backend/package-lock.json "$(dirname "$EXPRESS_SERVER")/package-lock.json"
            else
              echo "ERROR: 未找到可部署的Express server.js"
              exit 1
            fi

            # 同步前端静态文件到 ECS Nginx 根目录，兜底绕过 GitHub Pages 发布波动
            if [ -d "/tmp/docs" ]; then
              echo "同步前端静态文件 -> /usr/share/nginx/html"
              mkdir -p /usr/share/nginx/html
              rsync -a --delete /tmp/docs/ /usr/share/nginx/html/
            fi

            # 更新Nginx
            if [ -n "$NGINX_CONF" ] && [ -f "/tmp/deploy/ecs-live-config/nginx-lsjy-live.conf" ]; then
              for conf in /etc/nginx/conf.d/*.conf; do
                if [ "$conf" != "$NGINX_CONF" ] && grep -q "server_name.*api.lsjyapp.cn" "$conf" 2>/dev/null; then
                  echo "禁用重复Nginx配置: $conf"
                  mv "$conf" "$conf.disabled-$(date +%Y%m%d%H%M%S)"
                fi
              done
              sed -i 's/default_server//g' /tmp/deploy/ecs-live-config/nginx-lsjy-live.conf
              cp /tmp/deploy/ecs-live-config/nginx-lsjy-live.conf "$NGINX_CONF"
              nginx -t && nginx -s reload
              echo "Nginx配置已更新"
            fi

            # 写入后端模型环境变量（密钥来自 GitHub Secrets，不进入前端和源码）
            {
              printf '%s\n' "export SILICONFLOW_API_KEY='${{ secrets.SILICONFLOW_API_KEY }}'"
              printf '%s\n' "export ARK_API_KEY='${{ secrets.ARK_API_KEY }}'"
              printf '%s\n' "export BAILIAN_API_KEY='${{ secrets.BAILIAN_API_KEY }}'"
              printf '%s\n' "export DASHSCOPE_API_KEY='${{ secrets.DASHSCOPE_API_KEY }}'"
              printf '%s\n' "export WORKSPACE_ID='${{ secrets.WORKSPACE_ID }}'"
              printf '%s\n' "export ZHIPU_API_KEY='${{ secrets.ZHIPU_API_KEY }}'"
              printf '%s\n' "export BAIDU_API_KEY='${{ secrets.BAIDU_API_KEY }}'"
              printf '%s\n' "export HUNYUAN_API_KEY='${{ secrets.HUNYUAN_API_KEY }}'"
              printf '%s\n' "export DOUBAO_API_KEY='${{ secrets.DOUBAO_API_KEY }}'"
              printf '%s\n' "export DEEPSEEK_API_KEY='${{ secrets.DEEPSEEK_API_KEY }}'"
              printf '%s\n' "export TONGYI_API_KEY='${{ secrets.TONGYI_API_KEY }}'"
              printf '%s\n' "export KIMI_API_KEY='${{ secrets.KIMI_API_KEY }}'"
              printf '%s\n' "export JIMENG_API_KEY='${{ secrets.JIMENG_API_KEY }}'"
              printf '%s\n' "export OPENAI_API_KEY='${{ secrets.OPENAI_API_KEY }}'"
              printf '%s\n' "export VOLCENGINE_API_KEY='${{ secrets.VOLCENGINE_API_KEY }}'"
              printf '%s\n' "export MODELSCOPE_API_KEY='${{ secrets.MODELSCOPE_API_KEY }}'"
              printf '%s\n' "export LONGXIA_API_KEY='${{ secrets.LONGXIA_API_KEY }}'"
              printf '%s\n' "export YUANBAO_API_KEY='${{ secrets.YUANBAO_API_KEY }}'"
            } > /etc/profile.d/lsjy-ai-models.sh
            chmod 600 /etc/profile.d/lsjy-ai-models.sh
            set -a
            . /etc/profile.d/lsjy-ai-models.sh
            set +a

            # ===== DB凭据自动修复与持久化(用debian-sys-maint重置root密码/初次部署) =====
            echo "=== DB凭据自动修复 ==="

            # 设置DB默认值
            export DB_HOST="${DB_HOST:-localhost}"
            export DB_USERNAME="${DB_USERNAME:-root}"
            export DB_DATABASE="${DB_DATABASE:-lsjy_saas}"

            # Step1: 尝试从已有持久化配置加载
            echo "[1/4] 加载已有DB配置..."
            for DB_SRC in /etc/profile.d/lsjy-db.sh /opt/lsjy-app/backend/.env /opt/lsjy-app/.env; do
              if [ -f "$DB_SRC" ]; then
                set -a; . "$DB_SRC"; set +a
                echo "   已加载: $DB_SRC"
              fi
            done

            # Step2: 如果DB_PASSWORD仍为空→用debian-sys-maint凭据连MySQL重置root密码
            if [ -z "$DB_PASSWORD" ]; then
              echo "[2/4] DB_PASSWORD未设置,尝试用debian-sys-maint恢复..."
              DEBIAN_CNF="/etc/mysql/debian.cnf"
              if [ -f "$DEBIAN_CNF" ]; then
                MAINT_USER=$(grep -oP '^\s*user\s*=\s*\K.*' "$DEBIAN_CNF" | head -1 | tr -d ' ')
                MAINT_PASS=$(grep -oP '^\s*password\s*=\s*\K.*' "$DEBIAN_CNF" | head -1 | tr -d ' ')
                echo "   debian-sys-maint user=$MAINT_USER pass=长度${#MAINT_PASS}"

                # 用debian-sys-maint连接MySQL并重置root密码
                NEW_PASS="${ADMIN_PASSWORD:-LKZ2005430}"
                mysql -u "$MAINT_USER" -p"$MAINT_PASS" -e "
                  ALTER USER 'root'@'localhost' IDENTIFIED WITH mysql_native_password BY '$NEW_PASS';
                  FLUSH PRIVILEGES;
                " 2>&1 || echo "   (ALTER可能已执行,继续)"

                # 验证root可用新密码连接
                if mysql -u root -p"$NEW_PASS" -e "SELECT 1" 2>&1 | grep -q 1; then
                  export DB_PASSWORD="$NEW_PASS"
                  echo "   ✅ root密码已重置且可用"
                fi
              fi
            fi

            # Step3: 如果仍无DB_PASSWORD→最后兜底(直接用debian-sys-maint连接,导出密码给NestJS)
            if [ -z "$DB_PASSWORD" ]; then
              echo "[3/4] root密码重置失败,尝试直接用debian-sys-maint密码..."
              if [ -f "/etc/mysql/debian.cnf" ]; then
                MAINT_PASS2=$(grep -oP '^\s*password\s*=\s*\K.*' /etc/mysql/debian.cnf | head -1 | tr -d ' ')
                if mysql -u root -p"$MAINT_PASS2" -e "SELECT 1" 2>&1 | grep -q 1; then
                  export DB_PASSWORD="$MAINT_PASS2"
                  echo "   ✅ debian-sys-maint密码对root也有效"
                fi
              fi
            fi

            # Step4: 持久化到/etc/profile.d/lsjy-db.sh(下次部署自动加载)
            echo "[4/4] 持久化DB配置..."
            if [ -n "$DB_PASSWORD" ]; then
              {
                echo "export DB_HOST='${DB_HOST:-localhost}'"
                echo "export DB_USERNAME='${DB_USERNAME:-root}'"
                echo "export DB_PASSWORD='${DB_PASSWORD}'"
                echo "export DB_DATABASE='${DB_DATABASE:-lsjy_saas}'"
              } > /etc/profile.d/lsjy-db.sh
              chmod 600 /etc/profile.d/lsjy-db.sh
              echo "   ✅ /etc/profile.d/lsjy-db.sh 已创建"
            else
              echo "   ❌ DB_PASSWORD仍未解决! 请手动设置MySQL root密码后重新部署"
              echo "   手动修复: mysql -u root -p -e \"ALTER USER 'root'@'localhost' IDENTIFIED WITH mysql_native_password BY 'your_password';\""
              echo "   然后在GitHub Secrets添加 DB_PASSWORD"
            fi

            echo "   最终: DB_HOST=$DB_HOST DB_USERNAME=$DB_USERNAME DB_DATABASE=$DB_DATABASE DB_PASSWORD=$([ -n "$DB_PASSWORD" ] && echo '(已设置)' || echo '(空!)')"

            # 重启NestJS后端（主服务，端口3000）
            if [ -n "$NEST_MAIN" ] && [ -f "$NEST_MAIN" ]; then
              echo "重启NestJS后端: $NEST_MAIN"
              # 进程未注册时restart会失败(502根因),回退为首次start注册并启动
              pm2 restart lsjy-backend --update-env || pm2 start "$NEST_MAIN" --name lsjy-backend --update-env || true
            fi

            # 重启Express后端（备用服务，需使用不同端口避免冲突）
            pm2 delete lsjy-express >/dev/null 2>&1 || true
            # Express使用3001端口避免与NestJS 3000冲突
            pm2 start "$EXPRESS_SERVER" --name lsjy-express --update-env -- --port=3001 || true
            pm2 save || true

            # ===== 等待NestJS就绪(DB连接可能耗时) =====
            echo ""
            echo "=== 等待NestJS启动(最多40s,含DB连接) ==="
            NESTJS_READY=0
            for i in 1 2 3 4 5 6 7 8; do
              sleep 5
              HEALTH=$(curl -s --max-time 8 http://localhost:3000/api/v1/health 2>/dev/null)
              if [ -n "$HEALTH" ]; then
                echo "✅ NestJS health check 第${i}次成功"
                NESTJS_READY=1
                break
              fi
              # 检查进程是否存活(非errored/stopped)
              PM2_STATUS=$(pm2 jlist 2>/dev/null | grep -o '"name":"lsjy-backend"[^}]*"status":"[^"]*"' | grep -o '"status":"[^"]*"' | cut -d'"' -f4)
              echo "第${i}次: health='$HEALTH', pm2状态=$PM2_STATUS"
              if [ "$PM2_STATUS" = "errored" ] || [ "$PM2_STATUS" = "stopped" ]; then
                echo "⚠️ NestJS进程异常($PM2_STATUS),查看日志..."
                pm2 logs lsjy-backend --lines 30 --nostream || true
              fi
            done

            # 验证
            echo ""
            echo "=== 验证 ==="
            pm2 list

            # 验证API返回的agents数量
            AGENTS_COUNT=$(curl -s http://localhost:3000/api/v1/agents 2>/dev/null | grep -oP '"id":\d+' | wc -l)
            TOOLS_COUNT=$(curl -s http://localhost:3000/api/v1/ai/tools 2>/dev/null | grep -oP '"id":\d+' | wc -l)
            echo ""
            echo "Agents数量(从API): $AGENTS_COUNT"
            echo "Tools数量(从API): $TOOLS_COUNT"

            # 验证NestJS主服务是否正常（agents由NestJS提供）
            HEALTH=$(curl -s --max-time 10 http://localhost:3000/api/v1/health 2>/dev/null)
            echo "Health check: $HEALTH"
            if [ -z "$HEALTH" ] && [ "$NESTJS_READY" = "0" ]; then
              echo "ERROR: NestJS健康检查失败，服务未响应"
              pm2 logs lsjy-backend --lines 50 --nostream || true
              exit 1
            fi
            echo ""
            echo "注意: Express运行在3001端口，NestJS运行在3000端口"
            echo "如需验证充值接口: curl -X POST http://localhost:3000/api/v1/payment/admin/coins/set-balance ..."

            if echo "$AGENTS_COUNT" | grep -q "1[89][0-9]"; then
              echo "✅ 180个AI员工部署成功!"
            else
              echo "⚠️ Agents数量=$AGENTS_COUNT不是预期的180+(可能DB未连/NestJS正在初始化),不阻塞部署"
              echo "   原因: NestJS依赖MySQL,若DB_PASSWORD未注入或用默认空密码会连不上DB"
              echo "   日志摘要:"
              pm2 logs lsjy-backend --lines 15 --nostream 2>/dev/null | grep -iE 'error|database|typeorm|nest' | tail -5 || true
            fi

            if [ "$TOOLS_COUNT" -lt 1 ]; then
              echo "⚠️ Tools数量=$TOOLS_COUNT为0(NestJS初始化中或DB问题)"
            fi

            # ===== 核心后端(NestJS+Express)已上线并验证通过,最后才部署可选的Skill独立服务 =====
            # Docker镜像拉取(crawl4ai等)体积大会占满磁盘,放最后+磁盘守卫,避免影响已上线的核心服务
            AVAIL_KB=$(df -k / | awk 'NR==2{print $4}')
            echo "当前根分区可用: $((AVAIL_KB/1024)) MB"
            if [ "${AVAIL_KB:-0}" -gt 5242880 ] && [ -f "/tmp/deploy/skill-services/deploy-skill-services.sh" ]; then
              echo "磁盘空间充足(>5G),部署开源Skill独立服务(Matomo/crawl4ai等)"
              chmod +x /tmp/deploy/skill-services/deploy-skill-services.sh
              bash /tmp/deploy/skill-services/deploy-skill-services.sh || true
            else
              echo "⚠️ 磁盘可用<5G,跳过Skill独立服务部署(保护核心后端);如需部署请扩容或清理Docker"
            fi

            echo ""
            echo "=== 部署完成 ==="
          EOF