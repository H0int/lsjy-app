services:
  # ===== 已有服务：Matomo 统计 + Chroma 向量库 =====
  lsjy-matomo-db:
    image: mariadb:10.11
    container_name: lsjy-matomo-db
    restart: unless-stopped
    command: --max-allowed-packet=64MB
    environment:
      MYSQL_ROOT_PASSWORD: ${MATOMO_DB_ROOT_PASSWORD:-lsjy_matomo_root_2026}
      MYSQL_DATABASE: ${MATOMO_DB_NAME:-matomo}
      MYSQL_USER: ${MATOMO_DB_USER:-matomo}
      MYSQL_PASSWORD: ${MATOMO_DB_PASSWORD:-lsjy_matomo_2026}
    volumes:
      - lsjy_matomo_db:/var/lib/mysql
    networks:
      - lsjy_skill_net

  lsjy-matomo:
    image: matomo:5-apache
    container_name: lsjy-matomo
    restart: unless-stopped
    depends_on:
      - lsjy-matomo-db
    environment:
      MATOMO_DATABASE_HOST: lsjy-matomo-db
      MATOMO_DATABASE_ADAPTER: mysql
      MATOMO_DATABASE_TABLES_PREFIX: matomo_
      MATOMO_DATABASE_USERNAME: ${MATOMO_DB_USER:-matomo}
      MATOMO_DATABASE_PASSWORD: ${MATOMO_DB_PASSWORD:-lsjy_matomo_2026}
      MATOMO_DATABASE_DBNAME: ${MATOMO_DB_NAME:-matomo}
      MATOMO_ENABLE_PROXY_URI_HEADER: 1
      PHP_MEMORY_LIMIT: 256M
    ports:
      - "127.0.0.1:8088:80"
    volumes:
      - lsjy_matomo_app:/var/www/html
    networks:
      - lsjy_skill_net

  lsjy-chroma:
    image: chromadb/chroma:latest
    container_name: lsjy-chroma
    restart: unless-stopped
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
    ports:
      - "127.0.0.1:8008:8000"
    volumes:
      - lsjy_chroma_data:/chroma/chroma
    networks:
      - lsjy_skill_net

  # ===== 新增：Crawl4AI — AI网页爬虫（1容器，轻量） =====
  # GitHub: unclecode/crawl4ai ⭐67K
  # 功能：输入URL爬取网页，输出LLM友好的Markdown/JSON
  # API端口：11235
  lsjy-crawl4ai:
    image: unclecode/crawl4ai:latest
    container_name: lsjy-crawl4ai
    restart: unless-stopped
    ports:
      - "127.0.0.1:11235:11235"
    environment:
      CRAWL4AI_API_TOKEN: ${CRAWL4AI_API_TOKEN:-lsjy_crawl4ai_2026_secret}
      # LLM支持（可选，使用平台已有的免费模型）
      LLM_PROVIDER: ${CRAWL4AI_LLM_PROVIDER:-openai/glm-4-flash}
      LLM_BASE_URL: ${CRAWL4AI_LLM_BASE_URL:-https://open.bigmodel.cn/api/paas/v4}
      LLM_API_KEY: ${CRAWL4AI_LLM_API_KEY:-}
      LLM_TEMPERATURE: "0.7"
    volumes:
      - lsjy_crawl4ai_data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    shm_size: "1g"
    networks:
      - lsjy_skill_net

  # ===== 新增：Whisper — AI语音识别（CPU可跑） =====
  # GitHub: openai/whisper ⭐93K
  # 功能：语音转文字，支持99+语言
  # API端口：9000（内部），映射到 127.0.0.1:9000
  lsjy-whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest
    container_name: lsjy-whisper
    restart: unless-stopped
    ports:
      - "127.0.0.1:9000:9000"
    environment:
      ASR_ENGINE: ${WHISPER_ENGINE:-faster_whisper}
      ASR_MODEL: ${WHISPER_MODEL:-base}
      ASR_DEVICE: cpu
      MODEL_IDLE_TIMEOUT: "300"
    volumes:
      - lsjy_whisper_models:/root/.cache
    networks:
      - lsjy_skill_net

networks:
  lsjy_skill_net:
    name: lsjy_skill_net

volumes:
  lsjy_matomo_db:
  lsjy_matomo_app:
  lsjy_chroma_data:
  lsjy_crawl4ai_data:
  lsjy_whisper_models:
